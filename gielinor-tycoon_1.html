<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gielinor Tycoon — A Living Varrock</title>
<style>
:root{
  --stone:#3e3529; --stone2:#4d4439; --stone3:#2c261d; --edge:#1c1813;
  --parch:#d8ccb4; --parch-dim:#a89a80; --gold:#ffd24a; --gold-dim:#c9a24b;
  --moss:#7fae6b; --blood:#d6604a; --sky:#7fb6d9; --mag:#b48ae0;
  --panel:#332c22; --panel2:#272219;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#15110c;color:var(--parch);
  font:12px/1.45 Verdana,Geneva,sans-serif;}
h1,h2,h3,.serif{font-family:Cinzel,Georgia,'Times New Roman',serif}
button{font:inherit;color:var(--parch);background:linear-gradient(#564a38,#3e3529);
  border:1px solid #1c1813;border-radius:3px;padding:3px 9px;cursor:pointer}
button:hover{background:linear-gradient(#6a5c46,#4d4439);color:var(--gold)}
button:disabled{opacity:.45;cursor:not-allowed;color:var(--parch-dim)}
button.gold{color:var(--gold);border-color:#6b5a2a}
button.tiny{padding:1px 6px;font-size:11px}
input[type=range]{accent-color:var(--gold-dim)}
input[type=text],input[type=number],select{background:#221d15;color:var(--parch);
  border:1px solid #1c1813;border-radius:3px;padding:2px 6px;font:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#564a38;border-radius:4px}
::-webkit-scrollbar-track{background:#221d15}

#app{display:grid;height:100%;
  grid-template-rows:44px 1fr;
  grid-template-columns:1fr;
  grid-template-areas:"hud" "stage"}

/* ---------- HUD ---------- */
#hud{grid-area:hud;display:flex;align-items:center;gap:10px;padding:0 12px;
  background:linear-gradient(#4d4439,#332c22);border-bottom:2px solid var(--edge)}
#hud .title{font-family:Cinzel,Georgia,serif;font-size:17px;color:var(--gold);
  letter-spacing:1px;text-shadow:1px 1px 0 #000}
#hud .sub{font-size:10px;color:var(--parch-dim);margin-left:-4px}
.stat{display:flex;align-items:center;gap:4px;padding:2px 8px;background:#272219;
  border:1px solid var(--edge);border-radius:3px;white-space:nowrap}
.stat b{color:var(--gold)}
.spacer{flex:1}
#speedbox button.on{background:#6b5a2a;color:var(--gold)}
#clock{min-width:120px;text-align:center}

/* ---------- SIDE PANELS ---------- */
/* ---------- unified menu: floating overlay, dockable, default closed ---------- */
#panel-toggle{position:absolute;top:10px;right:10px;z-index:30;
  background:var(--panel);border:2px solid var(--gold-dim);color:var(--gold);
  padding:6px 12px;font-family:Cinzel,Georgia,serif;font-size:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.55)}
#stage.dock-left #panel-toggle{left:10px;right:auto}
#panel{position:absolute;top:10px;bottom:10px;right:10px;width:min(312px,86vw);z-index:25;
  display:none;flex-direction:column;overflow:hidden;
  background:rgba(33,29,22,.96);border:2px solid var(--edge);border-radius:6px;
  box-shadow:0 4px 22px rgba(0,0,0,.6)}
#stage.dock-left #panel{left:10px;right:auto}
#stage.panel-open #panel{display:flex}
#stage.panel-open #panel-toggle{display:none}
#panel-head{display:flex;align-items:stretch;border-bottom:1px solid var(--edge);background:#272219}
#panel-head .ptabs{flex:1}
#panel-close{border-radius:0;border:none;border-left:1px solid var(--edge);padding:0 10px;color:var(--gold)}
.ptabs{display:flex}
.ptabs button{flex:1;border-radius:0;border:none;border-right:1px solid var(--edge);
  background:#272219;padding:7px 2px;font-size:10.5px}
.ptabs button.on{background:var(--panel);color:var(--gold)}
.pbody{flex:1;overflow-y:auto;padding:8px}
.sec{margin-bottom:10px}
.sec h3{font-size:12px;color:var(--gold-dim);border-bottom:1px solid #564a38;
  padding-bottom:2px;margin-bottom:5px;letter-spacing:.5px}
.kv{display:flex;justify-content:space-between;padding:1px 0}
.kv span:last-child{color:var(--gold)}
.bar{height:7px;background:#1c1813;border-radius:3px;overflow:hidden;margin:2px 0}
.bar i{display:block;height:100%;background:var(--moss)}
.note{color:var(--parch-dim);font-size:11px}

/* hero roster cards */
.hcard{display:flex;gap:7px;align-items:center;padding:5px 6px;margin-bottom:4px;
  background:#272219;border:1px solid var(--edge);border-radius:4px;cursor:pointer}
.hcard:hover{border-color:var(--gold-dim)}
.hcard.sel{border-color:var(--gold);background:#332c1c}
.hcard .dot{width:22px;height:22px;border-radius:50%;border:2px solid #000;flex:none}
.hcard .nm{font-weight:bold;font-size:12px}
.hcard .meta{font-size:10px;color:var(--parch-dim)}
.hcard .hpbar{width:46px}
.badge{font-size:9px;padding:0 4px;border-radius:3px;background:#564a38;color:var(--gold)}
.badge.away{background:#3a4a66;color:var(--sky)}
.badge.dead{background:#5a2a22;color:var(--blood)}
.badge.r{background:#4a2a5a;color:var(--mag)}

/* chronicle */
.ev{padding:3px 5px;border-left:3px solid #564a38;margin-bottom:3px;background:#272219;font-size:11px}
.ev .t{color:var(--parch-dim);font-size:9px;margin-right:5px}
.ev.lv{border-color:var(--moss)} .ev.gold{border-color:var(--gold-dim)}
.ev.die{border-color:var(--blood)} .ev.boss{border-color:var(--mag)}
.ev.soc{border-color:var(--sky)} .ev.leg{border-color:var(--gold);background:#352c18}

/* ---------- STAGE ---------- */
#stage{grid-area:stage;position:relative;background:
  radial-gradient(1200px 700px at 50% 30%, #232a18 0%, #181a10 55%, #100f0a 100%);overflow:hidden}
#cv{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair}
#tip{position:absolute;pointer-events:none;background:#1c1813ee;border:1px solid var(--gold-dim);
  padding:4px 8px;border-radius:4px;font-size:11px;display:none;z-index:5;max-width:230px}
#onboard{position:absolute;left:50%;top:10px;transform:translateX(-50%);z-index:6;
  background:#1c1813ee;border:1px solid var(--gold-dim);border-radius:5px;padding:7px 12px;
  display:flex;gap:10px;align-items:center;max-width:560px}
#onboard b{color:var(--gold)}

/* ---------- DRAWER (hero panel) ---------- */
#drawer{position:absolute;left:10px;right:10px;bottom:10px;height:min(252px,45%);z-index:26;
  background:rgba(38,33,25,.97);border:2px solid var(--gold-dim);border-radius:6px;
  box-shadow:0 -4px 22px rgba(0,0,0,.6);
  display:none;overflow:hidden}
#d-close{position:absolute;top:6px;right:8px;z-index:5}
#stage.panel-open #drawer{right:calc(min(312px,86vw) + 18px)}
#stage.dock-left.panel-open #drawer{right:10px;left:calc(min(312px,86vw) + 18px)}
#stage.drawer-open #drawer{display:flex}
#drawer .col{padding:8px;overflow-y:auto}
#drawer .id{width:215px;border-right:1px solid var(--edge);flex:none}
#drawer .tabwrap{flex:1;display:flex;flex-direction:column;min-width:0}
#drawer .tabs{display:flex;border-bottom:1px solid var(--edge)}
#drawer .tabs button{border-radius:0;border:none;background:transparent;padding:5px 13px}
#drawer .tabs button.on{color:var(--gold);border-bottom:2px solid var(--gold)}
#drawer .tabbody{flex:1;overflow-y:auto;padding:8px 12px}
#drawer .cmds{width:215px;border-left:1px solid var(--edge);flex:none;padding:8px;overflow-y:auto}
#drawer .cmds button{display:block;width:100%;margin-bottom:4px;text-align:left}
.skgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.skcell{background:#272219;border:1px solid var(--edge);border-radius:3px;padding:2px 5px;font-size:11px;display:flex;justify-content:space-between}
.skcell b{color:var(--gold)}
.skcell.fav{border-color:var(--gold-dim)}
.thought{font-style:italic;color:#e8dfc8;background:#272219;border-left:3px solid var(--gold-dim);padding:5px 8px;margin-bottom:6px}
.gslot{display:inline-block;min-width:86px;background:#272219;border:1px solid var(--edge);
  border-radius:3px;padding:2px 6px;margin:0 4px 4px 0;font-size:10px}
.gslot b{display:block;color:var(--gold-dim);font-size:9px;text-transform:uppercase}
.tierF{color:#9fd08f}.tierP{color:#7fb6d9}.tierM{color:#e0a3ff}
.relrow{display:flex;justify-content:space-between;padding:1px 0;font-size:11px}

/* ---------- MODALS ---------- */
#modal{position:fixed;inset:0;background:#000a;display:none;z-index:20;
  align-items:center;justify-content:center}
#modal.on{display:flex}
#mbox{background:var(--panel);border:2px solid var(--gold-dim);border-radius:6px;
  min-width:430px;max-width:680px;max-height:84vh;display:flex;flex-direction:column}
#mhead{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;
  background:#272219;border-bottom:1px solid var(--edge)}
#mhead h2{font-size:15px;color:var(--gold)}
#mbody{padding:12px;overflow-y:auto}
.brow{display:flex;gap:8px;align-items:center;padding:6px;background:#272219;
  border:1px solid var(--edge);border-radius:4px;margin-bottom:5px}
.brow .info{flex:1}
.brow .info b{color:var(--gold)}
.brow .info .note{display:block}
table.t{width:100%;border-collapse:collapse;font-size:11px}
table.t td,table.t th{padding:2px 6px;border-bottom:1px solid #3a3328;text-align:left}
table.t th{color:var(--gold-dim)}
textarea#dbgout{width:100%;height:300px;background:#15110c;color:#9fd08f;
  font:10px/1.4 Consolas,Menlo,monospace;border:1px solid var(--edge)}
.votebar{height:14px;display:flex;border:1px solid var(--edge);border-radius:3px;overflow:hidden}
.votebar .yes{background:var(--blood)} .votebar .no{background:var(--moss)}
.flash-gold{animation:fg 1s} @keyframes fg{0%{box-shadow:0 0 14px var(--gold)}100%{}}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <span class="title">GIELINOR TYCOON</span><span class="sub">a living Varrock</span>
    <span class="stat" id="clock">Day 1 · 00:00</span>
    <span id="speedbox">
      <button class="tiny" data-sp="0">⏸</button><button class="tiny on" data-sp="1">1×</button><button class="tiny" data-sp="3">3×</button><button class="tiny" data-sp="8">8×</button>
    </span>
    <span class="stat">Treasury <b id="hud-gold">0</b></span>
    <span class="stat">Reputation <b id="hud-rep">0</b></span>
    <span class="stat">Heroes <b id="hud-pop">0</b></span>
    <span class="stat">Zezima slain <b id="hud-zez">0</b></span>
    <span class="spacer"></span>
    <button id="b-build" class="gold">⚒ Build</button>
    <button id="b-incent">⚖ Incentives</button>
    <button id="b-save">💾 Save / Load</button>
    <button id="b-settings">⚙</button>
    <button id="b-debug">⤓ Debug Log</button>
  </div>

  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="tip"></div>
    <div id="onboard"><span id="ob-text"></span><button class="tiny" id="ob-next">Next ▸</button><button class="tiny" id="ob-skip">Skip</button></div>

    <button id="panel-toggle" title="Open menu">📜 Menu</button>

    <div id="panel">
      <div id="panel-head">
        <div class="ptabs">
          <button class="on" data-pt="heroes">Heroes</button><button data-pt="chron">Chronicle</button><button data-pt="town">Town</button><button data-pt="shops">Shops</button><button data-pt="world">World</button><button data-pt="tele">Data</button>
        </div>
        <button class="tiny" id="panel-close" title="Minimize menu">✕</button>
      </div>
      <div class="pbody" id="panelbody"></div>
    </div>

    <div id="drawer">
      <button class="tiny" id="d-close" title="Close hero panel">✕</button>
      <div class="col id" id="d-id"></div>
      <div class="tabwrap">
        <div class="tabs" id="d-tabs">
          <button class="on" data-dt="stats">Stats</button><button data-dt="thoughts">Thoughts</button>
          <button data-dt="gear">Gear</button><button data-dt="rel">Relationships</button><button data-dt="saga">Saga</button>
        </div>
        <div class="tabbody" id="d-body"></div>
      </div>
      <div class="col cmds" id="d-cmds"></div>
    </div>
  </div>
</div>

<div id="modal"><div id="mbox">
  <div id="mhead"><h2 id="mtitle"></h2><button class="tiny" onclick="UI.closeModal()">✕</button></div>
  <div id="mbody"></div>
</div></div>

<script>
'use strict';
/* =====================================================================
   GIELINOR TYCOON — single-file Phase 0–6 build
   Sim core (no DOM) / Render-UI split, per HANDOFF §3.
   Canon math per EQUATIONS_AND_SCHEMAS.md; tunables in CONFIG.
   ===================================================================== */
/* ============================== CONFIG ============================== */
const CONFIG = {
  version:'0.6.0-html', tickSec:0.6, decisionTicks:5,
  xpRate:12,            // §9 compression slider (1–40)
  favoriteMult:1.5, secondaryMult:1.2,
  congestionK:6, stickyBonus:8, travelCostK:0.22, uiDock:'right',
  eatThresholdBase:0.5, safetyMargin:{lo:1.5, mid:1.15, hi:0.8},
  moveSpeed:3.2,        // tiles per sim tick? no — tiles/sec at 1×
  offlineRate:0.75, offlineCapH:24, offlineRareMult:0.5,
  priceK:0.6, priceFloor:0.4, priceCeil:1.3, sellMargin:0.55,
  geTax:0.01,
  wealthUpkeepRate:0.03, upkeepFloor:400, flatUpkeep:2,   // hero daily living cost — the §6 attractor fix
  shopRestockK:0.06, shopTierChance:0.004,
  enhSuccess:[0.90,0.65,0.35], enhBaseGold:120, enhTierMult:4, enhDowngradeChance:0.10,
  echoXP:0.10, echoDmg:0.05,
  repPerClear:8, repPerZezima:120, repPerKick:25, repPerDeath:2, repScale:120,
  baseImmig:1/420,      // applicants/sec at rep 0 (scaled by rep)
  leaveThreshold:22, leaveDurationDays:1.5, satProd:0.25,
  relDecay:0.985,
  reclaimFee:0.10, grabMin:1.2, grabMax:2.1, hastyMin:0.3, hastyMax:0.7,
  slayerCombatBonus:0.35, slayerUnlockKills:100, bossUnlockKills:15,
  rareComp:8,           // rare drop-rate compression to match XP compression (tunable)
  tierWeights:[0.89,0.08,0.025,0.005], tierBonus:[0,0.08,0.18,0.30],
  voteSeconds:30, voteQuorum:0.25, voteCooldown:90, forceKickAfter:5,
  popCapBase:14, popCapMax:50,
  goldDriftWarn:0.15,   // anomaly flag threshold per day
  simMinPerRealSec:2,   // 1 real sec = 2 sim minutes at 1× (day = 12 min)
};
const TIERS=['Standard','Fine','Pristine','Masterwork'];
const TIERCLS=['','tierF','tierP','tierM'];

/* ============================== RNG (seeded) ============================== */
let _seed=1234567;
function setSeed(s){_seed=(s>>>0)||1;}
function rng(){ _seed|=0; _seed=_seed+0x6D2B79F5|0; let t=Math.imul(_seed^_seed>>>15,1|_seed);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }
function ri(a,b){return a+Math.floor(rng()*(b-a+1));}
function pick(arr){return arr[Math.floor(rng()*arr.length)];}
function chance(p){return rng()<p;}

/* ============================== XP CURVE (canon-exact) ============================== */
const LVLXP=[0,0]; (function(){let p=0;for(let n=1;n<99;n++){p+=Math.floor(n+300*Math.pow(2,n/7));LVLXP[n+1]=Math.floor(p/4);}})();
function xpToLevel(xp){let lo=1,hi=99;while(lo<hi){const m=(lo+hi+1)>>1;if(xp>=LVLXP[m])lo=m;else hi=m-1;}return lo;}

/* ============================== SKILLS ============================== */
const SKILLS=['attack','strength','defence','hitpoints','prayer','ranged','magic',
  'mining','woodcutting','fishing','hunter',
  'crafting','smithing','cooking','fletching','runecraft','slayer'];
const COMBAT_SKILLS=['attack','strength','defence','hitpoints','prayer','ranged','magic'];
function cap(s){return s? s[0].toUpperCase()+s.slice(1):'';}

/* ============================== ITEM CATALOG ============================== */
const ITEMS={};
function I(id,name,o){ const it=Object.assign({id,name,slot:null,value:1,stack:false,
  strB:0,rStr:0,mDmg:0,spd:4,reqs:{},heal:0,prayerB:0,tags:[]},o);
  it.atk=Object.assign({melee:0,ranged:0,magic:0},o.atk||{});
  it.dfc=Object.assign({melee:0,ranged:0,magic:0},o.dfc||{});
  ITEMS[id]=it;}
/* -- weapons: melee scimitars (canon reqs 1/5/20/30/40/60) -- */
const METALS=[['bronze',1,7,7,16],['iron',5,10,10,28],['steel',20,15,14,90],['mithril',30,21,20,260],
  ['adamant',40,28,28,640],['rune',50,45,44,1600],['dragon',60,67,66,6000]];
METALS.forEach(([m,req,a,s,v])=>{
  I(m+'_scimitar',cap(m)+' scimitar',{slot:'weapon',style:'melee',atk:{melee:a,ranged:0,magic:0},strB:s,spd:4,reqs:{attack:req},value:v*3});
  if(m!=='dragon'){
    I(m+'_helm',cap(m)+' full helm',{slot:'helm',dfc:{melee:Math.round(a*0.8),ranged:Math.round(a*0.7),magic:-2},reqs:{defence:req},value:v*2});
    I(m+'_platebody',cap(m)+' platebody',{slot:'body',dfc:{melee:a*2,ranged:a*2,magic:-6},reqs:{defence:req},value:v*5});
    I(m+'_platelegs',cap(m)+' platelegs',{slot:'legs',dfc:{melee:a,ranged:a,magic:-4},reqs:{defence:req},value:v*4});
    I(m+'_kiteshield',cap(m)+' kiteshield',{slot:'shield',dfc:{melee:a,ranged:a,magic:-2},reqs:{defence:req},value:v*3});
  }
});
I('abyssal_whip','Abyssal whip',{slot:'weapon',style:'melee',atk:{melee:82},strB:82,spd:4,reqs:{attack:70},value:120000,tags:['rare']});
I('godsword','Godsword',{slot:'weapon',style:'melee',atk:{melee:95},strB:92,spd:6,reqs:{attack:75},value:300000,tags:['rare']});
I('gs_shard1','Godsword shard 1',{stack:true,value:25000,tags:['mat']});
I('gs_shard2','Godsword shard 2',{stack:true,value:25000,tags:['mat']});
I('gs_shard3','Godsword shard 3',{stack:true,value:25000,tags:['mat']});
I('bandos_chestplate','Bandos chestplate',{slot:'body',dfc:{melee:96,ranged:90,magic:-5},strB:4,reqs:{defence:65},value:150000,tags:['rare']});
I('armadyl_chest','Armadyl chestplate',{slot:'body',atk:{ranged:33},dfc:{melee:55,ranged:60,magic:50},reqs:{defence:70,ranged:70},value:150000,tags:['rare']});
/* -- ranged -- */
const BOWS=[['shortbow',1,8,18],['oak_shortbow',5,14,40],['willow_shortbow',20,20,120],
  ['maple_shortbow',30,29,300],['yew_shortbow',40,47,900],['magic_shortbow',50,69,2400]];
BOWS.forEach(([id,req,a,v])=>I(id,cap(id.replace('_',' ')),{slot:'weapon',style:'ranged',atk:{ranged:a},spd:4,reqs:{ranged:req},value:v}));
const ARROWS=[['bronze_arrow',1,7,1],['iron_arrow',1,10,2],['steel_arrow',5,16,5],
  ['mithril_arrow',20,22,12],['adamant_arrow',30,31,28],['rune_arrow',40,49,70]];
ARROWS.forEach(([id,req,s,v])=>I(id,cap(id.replace('_',' ')),{slot:'ammo',stack:true,rStr:s,reqs:{ranged:req},value:v}));
I('leather_body','Leather body',{slot:'body',dfc:{melee:8,ranged:9,magic:4},reqs:{},value:21});
I('studded_body','Studded body',{slot:'body',dfc:{melee:18,ranged:22,magic:8},atk:{ranged:2},reqs:{defence:20,ranged:20},value:550});
I('green_dhide','Green d\'hide body',{slot:'body',dfc:{melee:30,ranged:38,magic:18},atk:{ranged:15},reqs:{defence:40,ranged:40},value:4500});
I('black_dhide','Black d\'hide body',{slot:'body',dfc:{melee:50,ranged:60,magic:35},atk:{ranged:30},reqs:{defence:70,ranged:70},value:25000,tags:['rare']});
/* -- magic -- */
I('staff_of_air','Staff of air',{slot:'weapon',style:'magic',atk:{magic:10},spd:5,reqs:{},value:120,tags:['airstaff']});
I('battlestaff','Battlestaff',{slot:'weapon',style:'magic',atk:{magic:22},spd:5,reqs:{magic:30},value:1900,tags:['airstaff']});
I('mystic_staff','Mystic staff',{slot:'weapon',style:'magic',atk:{magic:35},mDmg:0.03,spd:5,reqs:{magic:40},value:6500,tags:['airstaff']});
I('wizard_robe','Wizard robes',{slot:'body',atk:{magic:5},dfc:{magic:8},reqs:{},value:60});
I('mystic_robe','Mystic robe top',{slot:'body',atk:{magic:20},dfc:{melee:12,ranged:10,magic:28},reqs:{magic:40,defence:20},value:7200});
I('occult_necklace','Occult necklace',{slot:'neck',atk:{magic:12},mDmg:0.10,reqs:{magic:70},value:80000,tags:['rare']});
/* -- neck / cape / ring / special -- */
I('strength_amulet','Amulet of strength',{slot:'neck',atk:{melee:10},strB:10,value:850});

});

function shopBuyPrice(shop,it){ // hero BUYS from shop
  const base=ITEMS[it].value, st=shop.stock[it]||0, mx=shop.maxs[it]||10;
  const bias=S.town.priceBias[it]||1;
  return Math.max(1,Math.round(base*Math.min(CONFIG.priceCeil,Math.max(CONFIG.priceFloor,1+CONFIG.priceK*(1-st/mx)))*bias));
}
function shopSellPrice(shop,it){ // hero SELLS to shop (shop pays below base; falls as stock rises)
  const base=ITEMS[it].value, st=shop.stock[it]||0, mx=Math.max(10,(shop.maxs[it]||10));
  const f=CONFIG.sellMargin*(1.3-Math.min(1,st/mx)*0.9);
  return Math.max(1,Math.round(base*Math.max(0.15,Math.min(0.75,f))));
}
function shopRestockTick(){ // periodic; level speeds it (§19.2)
  Object.values(S.shops).forEach(sh=>{
    const d=SHOPDEF[sh.key];
    Object.keys(sh.stock).forEach(it=>{ const base=d.stock[it]||0;
      if(sh.stock[it]>base&&chance(0.08+sh.level*0.002))sh.stock[it]--; });
    Object.keys(d.stock).forEach(it=>{
      if((sh.stock[it]||0)<d.stock[it] && chance(0.10*(1+CONFIG.shopRestockK*sh.level))) sh.stock[it]=(sh.stock[it]||0)+1;
    });
    // higher-tier restock chance with level — Horvik/swordshop gain better metals
    if(sh.level>=10&&chance(CONFIG.shopTierChance*sh.level)){
      const ups={swordshop:sh.level>=25?'rune_scimitar':'adamant_scimitar',horvik:sh.level>=25?'rune_platebody':'mithril_platebody',lowe:sh.level>=25?'yew_shortbow':'maple_shortbow',zaff:'mystic_staff'}[sh.key];
      if(ups){sh.stock[ups]=(sh.stock[ups]||0)+1; sh.maxs[ups]=Math.max(sh.maxs[ups]||0,3);}
    }
  });
}

  const w=RARITY.map((t,i)=>t[1]*(i>0?1+bias*i:1-bias)); const tot=w.reduce((a,b)=>a+b,0); r*=tot;
  for(let i=0;i<w.length;i++){if(r<w[i])return i; r-=w[i];} return 0; }

  if(fav==='ranged'){ giveItem(h,'shortbow',1,0); h.bank['iron_arrow|0']=300; }
  if(r>=1){giveItem(h,'steel_scimitar',1,0);giveItem(h,'steel_platebody',1,0);giveItem(h,'trout',6,0);}

function lvl(h,s){return xpToLevel(h.skills[s].xp);}
function isMaxed(h){return SKILLS.every(s=>lvl(h,s)>=99);}
function totalLevel(h){return SKILLS.reduce((a,s)=>a+lvl(h,s),0);}
function combatLevel(h){ const d=lvl(h,'defence'),hpv=lvl(h,'hitpoints'),p=lvl(h,'prayer');
  const base=0.25*(d+hpv+Math.floor(p/2));
  const mel=0.325*(lvl(h,'attack')+lvl(h,'strength'));
  const rg=0.325*Math.floor(lvl(h,'ranged')*1.5), mg=0.325*Math.floor(lvl(h,'magic')*1.5);
  return Math.floor(base+Math.max(mel,rg,mg)); }

/* ---------- inventory / bank / equipment ---------- */
function invCount(h){return h.inv.length;}
function findInv(h,id,tier){return h.inv.find(e=>e.id===id&&(tier===undefined||e.tier===(tier||0)));}
function invQty(h,id){let q=0;h.inv.forEach(e=>{if(e.id===id)q+=e.qty;});return q;}
function giveItem(h,id,qty,tier){ tier=tier||0; const it=ITEMS[id]; if(!it)return false;
  if(it.stack){ const e=findInv(h,id,tier); if(e){e.qty+=qty;return true;}
    if(invCount(h)>=28)return false; h.inv.push({id,qty,tier}); return true; }
  for(let i=0;i<qty;i++){ if(invCount(h)>=28)return false; h.inv.push({id,qty:1,tier}); } return true;
}
function takeItem(h,id,qty,tier){ let need=qty;
  for(let i=h.inv.length-1;i>=0&&need>0;i--){ const e=h.inv[i];
    if(e.id===id&&(tier===undefined||e.tier===(tier||0))){ const t=Math.min(e.qty,need); e.qty-=t; need-=t;
      if(e.qty<=0)h.inv.splice(i,1); } }
  return need<=0;
}
function bankKey(id,tier){return id+'|'+(tier||0);}
function bankSlots(h){return Object.keys(h.bank).length;}
function depositAll(h,keepFood){ let foodKept=0;
  for(let i=h.inv.length-1;i>=0;i--){ const e=h.inv[i];
    if(keepFood&&ITEMS[e.id].heal>0){ if(foodKept<8){foodKept+=e.qty;continue;} }
    if(ITEMS[e.id].tags.includes('untradeable')&&ITEMS[e.id].slot){/*keep capes equipped only*/}
    const k=bankKey(e.id,e.tier);
    if(!(k in h.bank)&&bankSlots(h)>=S.town.bankCap)continue; // bank full
    h.bank[k]=(h.bank[k]||0)+e.qty; h.inv.splice(i,1); } }
function withdraw(h,id,qty,tier){ const k=bankKey(id,tier||0); const have=h.bank[k]||0; const t=Math.min(have,qty);
  if(t<=0)return 0; if(giveItem(h,id,t,tier||0)){h.bank[k]-=t;if(h.bank[k]<=0)delete h.bank[k];return t;} return 0; }
function bankQty(h,id){ let q=0; Object.keys(h.bank).forEach(k=>{if(k.split('|')[0]===id)q+=h.bank[k];}); return q; }
function hasItem(h,id){ return invQty(h,id)>0||bankQty(h,id)>0||Object.values(h.equipped).some(e=>e&&e.id===id); }
function ownedBest(h,slot){ // best equippable item of slot across equip/inv/bank
  let best=null,bv=-1;
  const consider=(id,tier)=>{ const it=ITEMS[id]; if(!it||it.slot!==slot)return;
    if(!meetsReqs(h,it))return; const v=itemPower(it,tier);
    if(v>bv){bv=v;best={id,tier};} };
  h.inv.forEach(e=>consider(e.id,e.tier));
  Object.keys(h.bank).forEach(k=>{const [id,t]=k.split('|');consider(id,+t);});
  Object.values(h.equipped).forEach(e=>{if(e)consider(e.id,e.tier);});
  return best;
}
function meetsReqs(h,it){return Object.keys(it.reqs||{}).every(s=>lvl(h,s)>=it.reqs[s]);}
function tmult(tier){return 1+CONFIG.tierBonus[tier||0];}
function itemPower(it,tier){ const m=tmult(tier);
  return (it.atk.melee+it.atk.ranged+it.atk.magic+it.strB*1.2+it.rStr*1.2+it.mDmg*200
    +it.dfc.melee+it.dfc.ranged+it.dfc.magic+it.prayerB*2)*m; }
function equipFromAnywhere(h,id,tier){ const it=ITEMS[id]; if(!it.slot||!meetsReqs(h,it))return false;
  // locate: inventory first, else bank, else already equipped elsewhere
  let src=null;
  if(findInv(h,id,tier))src='inv'; else if(h.bank[bankKey(id,tier)])src='bank';
  else if(h.equipped[it.slot]&&h.equipped[it.slot].id===id&&h.equipped[it.slot].tier===tier)return true;
  if(!src)return false;
  const prev=h.equipped[it.slot];
  if(src==='inv')takeItem(h,id,1,tier); else {h.bank[bankKey(id,tier)]--; if(h.bank[bankKey(id,tier)]<=0)delete h.bank[bankKey(id,tier)];}
  h.equipped[it.slot]={id,tier:tier||0};
  if(prev){ const k=bankKey(prev.id,prev.tier); h.bank[k]=(h.bank[k]||0)+1; }
  return true;
}
function autoEquip(h,style){ // brain (§13): best gear hero can use, optionally biased to a style
  ['weapon','body','legs','helm','shield','neck','cape','ring','ammo'].forEach(slot=>{
    let best=null,bv=-1;
    const consider=(id,tier)=>{ const it=ITEMS[id]; if(!it||it.slot!==slot||!meetsReqs(h,it))return;
      let v=itemPower(it,tier);
      if(style&&it.style&&it.style!==style)v*=0.1;
      if(style&&slot==='weapon'&&it.style===style)v*=3;
      if(style==='ranged'&&slot==='ammo')v*=3;
      if(v>bv){bv=v;best={id,tier};} };
    h.inv.forEach(e=>consider(e.id,e.tier));
    Object.keys(h.bank).forEach(k=>{const p=k.split('|');consider(p[0],+p[1]);});
    if(h.equipped[slot])consider(h.equipped[slot].id,h.equipped[slot].tier);
    if(best&&(!h.equipped[slot]||h.equipped[slot].id!==best.id||h.equipped[slot].tier!==best.tier))
      equipFromAnywhere(h,best.id,best.tier);
  });
  // 2h godsword: no shield
  if(h.equipped.weapon&&h.equipped.weapon.id==='godsword'&&h.equipped.shield){
    const sh=h.equipped.shield; h.bank[bankKey(sh.id,sh.tier)]=(h.bank[bankKey(sh.id,sh.tier)]||0)+1; delete h.equipped.shield; }
}
function gearBonus(h,kind,style){ // sum equipped bonuses (atk/dfc per style, strB, rStr, mDmg, prayerB)
  let t=0; Object.values(h.equipped).forEach(e=>{ if(!e)return; const it=ITEMS[e.id],m=tmult(e.tier);
    if(kind==='atk')t+=it.atk[style]*m; else if(kind==='dfc')t+=it.dfc[style]*m;
    else if(kind==='strB')t+=it.strB*m; else if(kind==='rStr')t+=it.rStr*m;
    else if(kind==='mDmg')t+=it.mDmg; else if(kind==='prayerB')t+=it.prayerB; });
  return Math.round(t*10)/10;
}
function heroWealth(h){ let v=h.gold;
  h.inv.forEach(e=>v+=ITEMS[e.id].value*e.qty*tmult(e.tier));
  Object.keys(h.bank).forEach(k=>{const [id,t]=k.split('|');v+=ITEMS[id].value*h.bank[k]*tmult(+t);});
  return Math.round(v);
}

/* =====================================================================
   COMBAT — canon-exact core (EQUATIONS §2)
   ===================================================================== */
function bestSpell(h){ const ml=lvl(h,'magic'); let best=null;
  for(const sp of SPELLS){ if(sp[1]<=ml && canAffordRunes(h,sp[3])) best=sp; }
  return best; }
function canAffordRunes(h,cost){ return Object.keys(cost).every(r=>{
  if(r==='air_rune'&&h.equipped.weapon&&ITEMS[h.equipped.weapon.id].tags.includes('airstaff'))return true;
  return invQty(h,r)>=cost[r];}); }
function consumeRunes(h,cost){ Object.keys(cost).forEach(r=>{
  if(r==='air_rune'&&h.equipped.weapon&&ITEMS[h.equipped.weapon.id].tags.includes('airstaff'))return;
  takeItem(h,r,cost[r]); }); }
function heroStyle(h){ const w=h.equipped.weapon; if(!w)return 'melee';
  return ITEMS[w.id].style||'melee'; }
function weaponSpd(h){ const w=h.equipped.weapon; return w?ITEMS[w.id].spd:4; }
function situMult(h,mon){ // §1.1 companion: conditional multipliers (acc & dmg)
  let m=1; const neck=h.equipped.neck&&ITEMS[h.equipped.neck.id];
  const helm=h.equipped.helm&&ITEMS[h.equipped.helm.id];
  const salve=neck&&neck.tags.includes('salve')&&mon.undead;
  const onTask=helm&&helm.tags.includes('slayerhelm')&&h.slayerTask&&h.slayerTask.monId===mon.id;
  if(salve)m*=1.20; else if(onTask)m*=(heroStyle(h)==='melee'?1.1667:1.15);
  return m; }
function heroOffence(h,mon){ // returns {acc, maxHit, spd, style, castCost}
  const style=heroStyle(h); const situ=mon?situMult(h,mon):1;
  let effA,maxHit,gAtk,castCost=null;
  if(style==='magic'){ const sp=bestSpell(h);
    if(!sp)return {acc:0,maxHit:0,spd:5,style,castCost:null,noAmmo:true};
    castCost=sp[3];
    effA=lvl(h,'magic')+8; gAtk=gearBonus(h,'atk','magic');
    maxHit=Math.floor(sp[2]*(1+gearBonus(h,'mDmg'))*situ*h.echoDmg);
  } else if(style==='ranged'){
    const ammo=h.equipped.ammo;
    if(!ammo)return {acc:0,maxHit:0,spd:4,style,noAmmo:true};
    effA=lvl(h,'ranged')+8; gAtk=gearBonus(h,'atk','ranged');
    const effS=lvl(h,'ranged')+8;
    maxHit=Math.floor((0.5+effS*(gearBonus(h,'rStr')+64)/640)*situ*h.echoDmg);
  } else {
    effA=lvl(h,'attack')+8+3; gAtk=gearBonus(h,'atk','melee'); // aggressive-ish stance avg
    const effS=lvl(h,'strength')+8+3;
    maxHit=Math.floor((0.5+effS*(gearBonus(h,'strB')+64)/640)*situ*h.echoDmg);
  }
  let att=effA*(gAtk+64)*situ*h.echoDmg;
  if(mon&&mon.weak===style)att*=1.30; // weakness boost
  const def=mon?(mon.defLvl+9)*((mon.dBon[style]||0)+64):1;
  const acc=att>def?1-(def+2)/(2*(att+1)):att/(2*(def+1));
  return {acc,maxHit:Math.max(1,maxHit),spd:weaponSpd(h),style,castCost};
}
function monOffence(mon,h){ const style=mon.curStyle||mon.style;
  const att=(mon.attLvl+8)*64*1.1;
  const def=(lvl(h,'defence')+9)*((gearBonus(h,'dfc',style))+64);
  const acc=att>def?1-(def+2)/(2*(att+1)):att/(2*(def+1));
  return {acc,maxHit:mon.maxHit,spd:mon.spd,style}; }
function heroDPS(h,mon){ const o=heroOffence(h,mon); if(o.noAmmo)return 0.01;
  return ((o.maxHit+1)/2)*o.acc/(o.spd*0.6); }
function monDPS(mon,h){ const o=monOffence(mon,h);
  let d=((o.maxHit+1)/2)*o.acc/(o.spd*0.6);
  if(h.praying===o.style)d*= mon.boss?0.5:0.08; // protect prayer
  return d; }
function winCheck(h,mon){ // §2 "am I winning?" — statistical, both directions
  const my=heroDPS(h,mon); let their=monDPS(mon,h);
  if(lvl(h,'prayer')>=37&&h.prayerPts>8&&(mon.boss||mon.maxHit>maxHp(h)*0.2))their*= mon.boss?0.6:0.3; // prays vs real threats
  const ttk=mon.hpCur!==undefined?mon.hpCur/my:mon.hp/my;
  const foodHeal=h.inv.reduce((a,e)=>a+(ITEMS[e.id].heal||0)*e.qty,0);
  const survive=(h.hp+foodHeal)/Math.max(0.05,their);
  const margin=h.traits.risk>0.66?CONFIG.safetyMargin.hi:h.traits.risk>0.33?CONFIG.safetyMargin.mid:CONFIG.safetyMargin.lo;
  return ttk<survive*1/margin*1.0 || ttk < survive/margin; }
function powerScore(h){ // rough hero power for feasibility gating
  const st=heroStyle(h);
  const off=st==='melee'?(lvl(h,'attack')+lvl(h,'strength'))/2:lvl(h,st);
  return off+maxHp(h)*0.5+gearBonus(h,'atk',st)*0.3+gearBonus(h,'strB')*0.3; }
function canTake(h,monId){ const m=MONSTERS[monId];
  if(m.slayerReq>lvl(h,'slayer'))return false;
  const dummy=Object.assign({hpCur:m.hp},m);
  return winCheck(h,dummy); }
function canTakeProvisioned(h,monId){ const m=MONSTERS[monId];
  if(m.slayerReq>lvl(h,'slayer'))return false;
  const my=heroDPS(h,Object.assign({hpCur:m.hp},m));
  let their=monDPS(m,h);
  if(lvl(h,'prayer')>=37&&(m.boss||m.maxHit>maxHp(h)*0.2))their*= m.boss?0.6:0.3;
  const survive=(maxHp(h)+(m.boss?14:8)*(h._bf||6))/Math.max(0.05,their);
  const margin=h.traits.risk>0.66?CONFIG.safetyMargin.hi:h.traits.risk>0.33?CONFIG.safetyMargin.mid:CONFIG.safetyMargin.lo;
  return (m.hp/Math.max(0.02,my))<survive/margin; }

/* hero attacks a monster instance (live tick) */
function heroStrike(h,mi,statMode){
  const mon=MONSTERS[mi.id]; const o=heroOffence(h,mi.runtime||mon);
  if(o.noAmmo){h.thought=o.style==='magic'?'Out of runes\u2026':'Out of arrows\u2026';return 'noammo';}
  let dmg=0;
  if(statMode){ dmg=((o.maxHit+1)/2)*o.acc; }
  else { if(rng()<o.acc)dmg=ri(0,o.maxHit); }
  // Kree melee immunity
  if(mon.meleeImmune&&o.style==='melee')dmg=0;
  // Zezima prayer wall
  if(mi.zPray&&mi.zPray===o.style)dmg*= 0.12;
  if(o.castCost)consumeRunes(h,o.castCost);
  if(o.style==='ranged'&&!statMode&&h.equipped.ammo){ const a=h.equipped.ammo;
    if(chance(0.8)){ // arrows break/lost (no Ava's)
      const e=findInv(h,a.id,a.tier); if(e){e.qty--;if(e.qty<=0){h.inv.splice(h.inv.indexOf(e),1);}}
      else { /* equipped stack abstract */ }
    } }
  mi.hpCur-=dmg;
  if(dmg>0){
    const xs=o.style==='melee'?(h.directives.trainSkill&&['attack','strength','defence'].includes(h.directives.trainSkill)?h.directives.trainSkill:pick(['attack','strength','strength','defence'])):o.style;
    gainXP(h,xs,dmg*4); gainXP(h,'hitpoints',dmg*1.33);
  }
  if(mi.hpCur<=0)return 'kill';
  return 'hit';
}
function monStrike(mi,h,statMode){
  const mon=MONSTERS[mi.id]; mi.curStyle=mi.curStyle||mon.style;
  // boss style switching (Jad/Scurrius/Zezima)
  if(mon.switches||mon.isZezima){ if(chance(0.35))mi.curStyle=pick(['melee','ranged','magic']); }
  const tmp=Object.assign({},mon,{curStyle:mi.curStyle});
  const o=monOffence(tmp,h);
  // auto-prayer: hero prays vs incoming style when in danger (lvl>=37 protect all 3; simplified >=13)
  if(lvl(h,'prayer')>=13&&h.prayerPts>0&&(mon.boss||o.maxHit>maxHp(h)*0.2)){
    const correct=mon.boss?(0.55+0.4*h.traits.patience):1;
    h.praying=chance(correct)?o.style:pick(['melee','ranged','magic']);
  } else h.praying=null;
  let dmg=0;
  if(statMode){ dmg=((o.maxHit+1)/2)*o.acc; if(h.praying===o.style)dmg*=mon.boss?0.5:0.08; }
  else { if(rng()<o.acc){ dmg=ri(0,o.maxHit);
    if(h.praying===o.style)dmg=mon.boss?Math.floor(dmg*0.5):0;
    if(mon.praySmash&&chance(0.2)){dmg=ri(10,o.maxHit);h.prayerPts=Math.max(0,h.prayerPts-8);} } }
  h.hp-=dmg;
  if(h.praying&&h.prayerPts>0){h.prayerPts=Math.max(0,h.prayerPts-(statMode?0.5:0.34*(1-Math.min(0.5,gearBonus(h,'prayerB')*0.02))));}
  return dmg;
}
function tryEat(h){ // reactive interrupt: eat best food at threshold
  if(h.hp>=maxHp(h)*CONFIG.eatThresholdBase)return false;
  let best=null,bh=0; h.inv.forEach(e=>{const heal=ITEMS[e.id].heal||0;if(heal>bh){bh=heal;best=e;}});
  if(!best)return false;
  takeItem(h,best.id,1,best.tier); h.hp=Math.min(maxHp(h),h.hp+bh); return true;
}
function foodCount(h){return h.inv.reduce((a,e)=>a+((ITEMS[e.id].heal||0)>0?e.qty:0),0);}

/* drop rolls — quality tiers + rare compression + slayer extra roll */
function rollDrops(h,mon,extraRoll){
  const rolls=1+(extraRoll?1:0);
  for(let r=0;r<rolls;r++){
    mon.drops.forEach(([id,rate,qty])=>{
      let eff=rate; if(rate>=20)eff=Math.max(4,rate/CONFIG.rareComp); // compress rares
      if(S.offlineMode&&rate>=20)eff*=2; // offline rares ×0.5 chance (§4)
      if(chance(1/eff)){
        let tier=0; const it=ITEMS[id];
        if(it.slot&&!it.stack){ const w=rng(); let acc2=0;
          for(let i=0;i<4;i++){acc2+=CONFIG.tierWeights[i];if(w<acc2){tier=i;break;}} }
        const q=typeof qty==='number'?qty:1;
        if(!giveItem(h,id,q,tier)){ /* inv full: drop to floor grave-less — bank later */ }
        else if(tier>=2||(it.tags&&it.tags.includes('rare')&&rate>=20)){
          chron(2,`${h.name} received ${TIERS[tier]!=='Standard'?TIERS[tier]+' ':''}${it.name} from ${mon.name}!`,h.id,'boss');
        }
      }
    });
  }
  const coins=ri(mon.coins[0],mon.coins[1]); h.gold+=coins;
  const b=S.town.bounties[mon.id]; if(b&&S.town.gold>=b){S.town.gold-=b;h.gold+=b;}
  return coins;
}
function onKill(h,mi){
  const mon=MONSTERS[mi.id];
  h.kills++; S.town.kills++;
  S.town.monsterKills[mi.id]=(S.town.monsterKills[mi.id]||0)+1;
  h.killsByMonster[mi.id]=(h.killsByMonster[mi.id]||0)+1;
  const onTask=h.slayerTask&&h.slayerTask.monId===mi.id;
  rollDrops(h,mon,onTask);
  if(onTask){ h.slayerTask.left--; gainXP(h,'slayer',(mon.xpHP||mon.hp)*0.9);
    if(h.slayerTask.partners)h.slayerTask.partners.forEach(pid=>{const p=heroById(pid);if(p&&p!==h&&p.slayerTask)p.slayerTask.left=h.slayerTask.left;});
    if(h.slayerTask.left<=0){ h.slayerPts+=ri(8,16);
      chron(2,`${h.name} completed a Slayer task (${mon.name}) — ${h.slayerPts} points banked.`,h.id,'lv');
      h.saga.push(`Completed Slayer task: ${mon.name}.`); h.slayerTask=null; } }
  // monster-unlock pacing (§15.2)
  const need=mon.boss?CONFIG.bossUnlockKills:CONFIG.slayerUnlockKills;
  if(S.town.monsterKills[mi.id]===need)
    chron(2,`${mon.name} is now well-studied (${need} colony kills) — eligible for Vannaka\u2019s task pool.`,null,'lv');
  if(mon.boss){ chron(mon.isZezima?5:3,`${h.name} slew ${mon.name}!`,h.id,'boss'); h.saga.push(`Slew ${mon.name}.`);
    S.town.rep+=CONFIG.repPerClear*0.5; }
}
function heroById(id){return S.heroes.find(h=>h.id===id);}

/* =====================================================================
   HERO BRAIN — layered utility (§18 / EQUATIONS §4)
   ===================================================================== */
function gainXP(h,skill,amt){
  const s=h.skills[skill]; const before=xpToLevel(s.xp);
  const prod=1+CONFIG.satProd*(h.satisfaction-50)/50;
  let mult=CONFIG.xpRate*h.echoXP*prod;
  if(skill!=='hitpoints'&&['attack','strength','defence','ranged','magic'].includes(skill)&&S.town.buildings.dummies&&h.zone==='home')mult*=1.1;
  s.xp=Math.min(LVLXP[99]*1.5,s.xp+amt*mult);
  const after=xpToLevel(s.xp);
  if(after>before){
    if(skill==='hitpoints')h.hp=Math.min(maxHp(h),h.hp+(after-before));
    if(skill==='prayer')h.prayerPts=Math.min(after,h.prayerPts+(after-before));
    if(after===99){ chron(4,`${h.name} reached level 99 ${cap(skill)}! The town cheers.`,h.id,'leg');
      h.saga.push(`Achieved 99 ${cap(skill)}.`); giveItem(h,'skillcape',1,0); S.town.rep+=6;
      if(isMaxed(h)){chron(5,`${h.name} has MAXED — every skill at 99. A true completed life.`,h.id,'leg');h.saga.push('Maxed all skills.');}
    } else if(after%10===0||after>=92){ chron(after>=92?2:1,`${h.name} reached ${cap(skill)} ${after}.`,h.id,'lv'); }
    h.satisfaction=Math.min(100,h.satisfaction+1.5);
  }
}
const NODE_RES={mine:'ores',wc:'logs',fish:'fish',hunt:'fur',essence:'essence'};
function bestNodeRes(h,node){ // best resource the hero can work at this node type
  if(node==='mine'){ const o=[['runite_ore',85],['adamantite_ore',70],['mithril_ore',55],['coal',30],['iron_ore',15],['copper_ore',1]];
    for(const [id,l]of o)if(lvl(h,'mining')>=l)return id; }
  if(node==='wc'){ const o=[['yew_logs',60],['maple_logs',45],['willow_logs',30],['oak_logs',15],['logs',1]];
    for(const [id,l]of o)if(lvl(h,'woodcutting')>=l)return id; }
  if(node==='fish'){ const o=[['raw_shark',76],['raw_swordfish',50],['raw_lobster',40],['raw_trout',20],['raw_shrimp',1]];
    for(const [id,l]of o)if(lvl(h,'fishing')>=ITEMS[id].fishLvl)return id; }
  if(node==='hunt')return 'kebbit_fur';
  if(node==='essence')return 'rune_essence';
  return null;
}
function congestionAt(key){ let c=0; S.heroes.forEach(o=>{if(o.act&&o.act.loc===key&&!o.dead)c++;}); return c; }
function drive(h){ // Layer 1 — needs 0..100
  return {
    survival:100*(1-h.hp/maxHp(h)),
    supplies:Math.max(0,60-foodCount(h)*8),
    space:invCount(h)>=24?70:0,
    growth:40+(h.traits.ambition*40),
    wealth:Math.max(0,55-Math.min(55,h.gold/40))*(0.5+h.traits.greed),
    social:h.traits.sociability*30,
  };
}
function expectedGoldPerHr(h,actType,data){ // rough, for utility & offline (§3)
  if(actType==='gather'){ const res=data.res; const rate=actionRate(h,data.skill);
    return ITEMS[res].value*rate*3600*0.5; }
  if(actType==='fight'){ const mon=MONSTERS[data.monId]; const dps=heroDPS(h,Object.assign({hpCur:mon.hp},mon));
    const kph=3600/Math.max(4,(mon.hp/Math.max(0.05,dps))+6);
    return kph*((mon.coins[0]+mon.coins[1])/2+(S.town.bounties[data.monId]||0)); }
  return 0;
}
function actionRate(h,skill){ // actions/sec for gathering/production
  let r=(0.08+lvl(h,skill)*0.004);
  if(skill==='smithing'&&S.town.buildings.smithyAnnex)r*=1.25;
  if(skill==='cooking'&&S.town.buildings.cookRange)r*=1.25;
  return r;
}
function favMult(h,skill){ return skill===h.fav?CONFIG.favoriteMult:skill===h.sec?CONFIG.secondaryMult:1; }
function skillNeed(h,skill){ const L=lvl(h,skill); return L>=99?0:(1+(99-L)/99)*(h.traits.ambition*0.5+0.75); }

function chooseActivity(h){ // Layer 2 — score candidates, pick argmax
  if(h.nudge){ const n=h.nudge; h.nudge=null; return n; }
  h._bf=['shark','swordfish','lobster','trout','shrimp'].map(f=>bankQty(h,f)+invQty(h,f)>0?ITEMS[f].heal:0).reduce((a,b)=>Math.max(a,b),3);
  const d=drive(h); const cand=[];
  const here=h.zone;
  const add=(type,loc,data,s,label)=>cand.push({type,loc,data:data||{},s,label});
  const dst=k=>LOC[k]?Math.hypot(h.x-LOC[k].x,h.y-LOC[k].y):6;
  // --- survival/maintenance first-order ---
  if(d.space>0)add('bank','westBank',{},60+d.space,'bank a full pack');
  if(foodCount(h)<2&&h.gold>shopBuyPrice(S.shops.plaza,'shrimp')*3)
    { const ps=S.shops.plaza.stock;
      const anyFood=['shark','swordfish','lobster','trout','shrimp'].some(f=>(ps[f]||0)>0);
      const bankFood=['shark','swordfish','lobster','trout','shrimp'].some(f=>bankQty(h,f)>0);
      if(anyFood)add('shopBuy','plaza',{itemId:bestAffordableFood(h),qty:10},42+d.supplies*0.5,'restock food');
      else if(bankFood)add('bank',nearestBankKey(h),{food:true},40+d.supplies*0.5,'fetch food from the bank'); }
  // --- gathering (per node) ---
  [['mineSE','mining','mine'],['barbMine','mining','mine'],['yewsE','woodcutting','wc'],['willowsS','woodcutting','wc'],
   ['riverW','fishing','fish'],['riverS','fishing','fish'],['hunterE','hunter','hunt'],['essence','runecraft','essence']].forEach(([k,skill,node])=>{
    if(invCount(h)>24)return;
    const res=bestNodeRes(h,node); if(!res)return;
    let s=10+skillNeed(h,skill)*14*favMult(h,skill);
    s+=Math.min(14,ITEMS[res].value*0.02)*(0.5+h.traits.greed);
    if(skill==='fishing'){ const ps=S.shops.plaza.stock;
      const foodStock=(ps.shrimp||0)+(ps.trout||0)+(ps.lobster||0)+(ps.swordfish||0)+(ps.shark||0);
      if(foodStock<12)s+=Math.min(20,(12-foodStock)*2)*(0.4+h.traits.greed); }
    s-=congestionAt(k)*CONFIG.congestionK; s-=dst(k)*CONFIG.travelCostK;
    if(h.directives.focus===skill)s+=18;
    add('gather',k,{skill,res,node},s,`gather ${ITEMS[res].name.toLowerCase()}`);
  });
  // --- production: smith / cook / fletch / craft / runecraft-at-altar handled via gather→recipe ---
  const rec=bestRecipe(h);
  let recBonus=0;
  if(rec&&ITEMS[rec.out].heal>0){ const ps=S.shops.plaza.stock;
    const foodStock=(ps.shrimp||0)+(ps.trout||0)+(ps.lobster||0)+(ps.swordfish||0)+(ps.shark||0);
    if(foodStock<12)recBonus=Math.min(20,(12-foodStock)*2)*(0.4+h.traits.greed); }
  if(rec)add('craft',rec.station==='anvil'||rec.station==='furnace'?'anvil':rec.station==='altar'?'church':rec.station==='range'?'range':'westBank',
    {rec}, 12+skillNeed(h,rec.skill)*13*favMult(h,rec.skill)+recBonus+(h.directives.focus===rec.skill?18:0),'craft '+ITEMS[rec.out].name.toLowerCase());
  // --- prayer training ---
  if(invQty(h,'bones')+invQty(h,'big_bones')+bankQty(h,'bones')+bankQty(h,'big_bones')>=8)
    add('pray','church',{},10+skillNeed(h,'prayer')*13*favMult(h,'prayer')
      +(lvl(h,'prayer')<43?6:0),'offer bones at the altar');
  // --- combat: home camps + sewers + zones ---
  const camps=[['farmS','chicken'],['cowField','cow'],['roadE','goblin'],['sqStreets','man'],['palaceYard','guard'],['stoneCircle','darkwiz7'],['stoneCircle','darkwiz20']];
  camps.forEach(([k,mid])=>{
    if(h.fear&&h.fear[mid]&&S.simSec<h.fear[mid])return;
    if(!canTake(h,mid))return;
    const mon=MONSTERS[mid];
    let s=11+skillNeed(h,combatFavSkill(h))*13*favMult(h,combatFavSkill(h));
    s+=Math.min(12,(mon.coins[1]+(S.town.bounties[mid]||0)*2)*0.06)*(0.5+h.traits.greed);
    s+=mon.cmb*0.08; s-=congestionAt(k)*CONFIG.congestionK*0.6; s-=dst(k)*CONFIG.travelCostK;
    if(foodCount(h)<1)s-=8;
    if(h.directives.focus&&COMBAT_SKILLS.includes(h.directives.focus))s+=14;
    if(h.slayerTask&&h.slayerTask.monId===mid)s+=26;
    add('fight',k,{monId:mid,camp:true},s,`fight ${mon.name.toLowerCase()}s`);
  });
  // away zones (incl. sewers) — pick best feasible monster per zone
  Object.values(ZONES).forEach(z=>{
    if(z.id==='home'||z.id==='zezima')return;
    if(!z.gate(h))return;
    if(z.pvp&&h.traits.risk<0.45&&!h.directives.allowWild)return;
    if(h.directives.avoidWild&&z.pvp)return;
    let best=null;
    const feared=mid=>h.fear&&h.fear[mid]&&S.simSec<h.fear[mid];
    (z.roster||[]).forEach(mid=>{ if(!feared(mid)&&canTakeProvisioned(h,mid)&&(!best||MONSTERS[mid].cmb>MONSTERS[best].cmb))best=mid; });
    if(z.boss&&!feared(z.boss)&&canTakeProvisioned(h,z.boss)&&chance(0.7))best=z.boss;
    if(z.waves){ if(!hasItem(h,z.reward)&&canTakeProvisioned(h,z.boss))best=z.boss; else return; }
    if(z.generals){ best='gwd_follower'; if(!canTakeProvisioned(h,best))return; }
    if(!best)return;
    const mon=MONSTERS[best];
    let s=12+skillNeed(h,combatFavSkill(h))*12*favMult(h,combatFavSkill(h));
    s+=Math.min(18,(mon.xpHP||mon.hp)*0.05)+(mon.boss?12:0);
    const need=mon.boss?CONFIG.bossUnlockKills:CONFIG.slayerUnlockKills;
    if((S.town.monsterKills[best]||0)<need)s+=8; // novelty: unstudied content
    s+=(z.pvp?10*h.traits.risk:0);
    if(h.slayerTask&&(z.roster||[]).includes(h.slayerTask.monId)){s+=26;best=h.slayerTask.monId;}
    s-=4; // travel/commitment cost
    if(foodCount(h)<3)s-=10;
    add('fight','__zone_'+z.id,{monId:best,zone:z.id},s,`hunt in ${z.name}`);
  });
  // --- slayer: get a task ---
  if(!h.slayerTask&&combatLevel(h)>=40&&S.town.slayerPool.length)
    add('slayerGet','gateW',{},26+skillNeed(h,combatFavSkill(h))*13*favMult(h,combatFavSkill(h))
      +h.traits.ambition*10+(h.directives.focus==='slayer'?20:0),'get a Slayer task from Vannaka');
  // --- gear shopping: buy best affordable upgrade ---
  const up=bestShopUpgrade(h);
  if(up)add('shopBuy',up.shopKey,{itemId:up.itemId,qty:1,equip:true},14+up.gain*0.5+h.traits.greed*4,'buy a '+ITEMS[up.itemId].name);
  // ranged/magic supplies — keyed to the style the hero WANTS to fight with
  const meleeMaxed=lvl(h,'attack')>=99&&lvl(h,'strength')>=99&&lvl(h,'defence')>=99;
  const wantStyle=(h.fav==='magic'||h.directives.focus==='magic')?'magic'
    :(h.fav==='ranged'||h.directives.focus==='ranged')?'ranged'
    :meleeMaxed&&lvl(h,'magic')<99?'magic'
    :meleeMaxed&&lvl(h,'ranged')<99?'ranged':heroStyle(h);
  if(wantStyle==='ranged'&&invQty(h,arrowFor(h))+bankQty(h,arrowFor(h))<40&&h.gold>200)
    add('shopBuy','lowe',{itemId:arrowFor(h),qty:100,equip:true},
      (invQty(h,arrowFor(h))+bankQty(h,arrowFor(h))<10?48:34),'restock arrows');
  if(wantStyle==='magic'&&h.gold>150&&(invQty(h,'mind_rune')+bankQty(h,'mind_rune'))<30)
    add('shopBuy','aubury',{itemId:'mind_rune',qty:60,also:[['air_rune',100],['chaos_rune',30],['fire_rune',80],['death_rune',10]]},
      (!bestSpell(h)?48:34),'restock runes');
  // --- sell loot ---
  if(sellableValue(h)>120)add('sellLoot','plaza',{},12+Math.min(22,sellableValue(h)*0.02)*(0.5+h.traits.greed),'sell loot');
  // --- enhancement (§5.6) ---
  if(S.town.buildings.forge){ const enh=bestEnhanceTarget(h);
    if(enh)add('enhance','anvil',{slot:enh.slot},26+h.traits.greed*10+h.traits.ambition*8
      +Math.min(20,h.gold/200)+rng()*8,'enhance '+ITEMS[h.equipped[enh.slot].id].name); }
  // --- GE offers (post unlock) ---
  if(S.town.geUnlocked&&(sellableValue(h)>300||geWishlist(h)))
    add('geTrade','geSite',{},16+h.traits.greed*10+Math.min(12,sellableValue(h)/150),'trade at the Grand Exchange');
  // --- social rest ---
  add('rest','tavern',{},4+d.social*0.25+(h.satisfaction<40?8:0),'rest at the tavern');
  // --- reincarnation & Zezima ---
  if(isMaxed(h))add('reincarnate','church',{},20+h.traits.ambition*30,'reincarnate — begin a new life');
  if(ZONES.zezima.gate(h))add('fight','__zone_zezima',{monId:'zezima',zone:'zezima'},25+h.traits.ambition*30,'challenge ZEZIMA');
  // stickiness (anti-thrash, §18.6)
  cand.forEach(c=>{ if(h.act&&h.act.type===c.type&&h.act.loc===c.loc)c.s+=CONFIG.stickyBonus; });
  cand.sort((a,b)=>b.s-a.s);
  return cand[0]||{type:'rest',loc:'tavern',data:{},s:1,label:'idle'};
}
function combatFavSkill(h){ return COMBAT_SKILLS.includes(h.fav)?h.fav:COMBAT_SKILLS.includes(h.sec)?h.sec:'strength'; }
function bestAffordableFood(h){ const sh=S.shops.plaza;
  for(const f of ['shark','swordfish','lobster','trout','shrimp']) if((sh.stock[f]||0)>0&&h.gold>=shopBuyPrice(sh,f)*3)return f;
  return 'shrimp'; }
function arrowFor(h){ const r=lvl(h,'ranged');
  if(r>=40)return 'rune_arrow'; if(r>=30)return 'adamant_arrow'; if(r>=20)return 'mithril_arrow';
  if(r>=5)return 'steel_arrow'; return 'iron_arrow'; }
function sellableValue(h){ let v=0; h.inv.forEach(e=>{const it=ITEMS[e.id];
  if(it.heal>0&&e.qty<=6)return; if(it.tags.includes('untradeable'))return;
  if(it.slot&&itemPower(it,e.tier)>0&&isUpgradeFor(h,e.id))return;
  v+=it.value*e.qty*0.4;}); return v; }
function isUpgradeFor(h,id){ const it=ITEMS[id]; if(!it.slot)return false;
  const cur=h.equipped[it.slot]; if(!cur)return meetsReqs(h,it)||closeToReqs(h,it);
  return itemPower(it,0)>itemPower(ITEMS[cur.id],cur.tier)&&(meetsReqs(h,it)||closeToReqs(h,it)); }
function closeToReqs(h,it){ return Object.keys(it.reqs||{}).every(s=>lvl(h,s)>=it.reqs[s]-10); }
function bestShopUpgrade(h){ let best=null;
  Object.values(S.shops).forEach(sh=>{ Object.keys(sh.stock).forEach(itid=>{
    if((sh.stock[itid]||0)<=0)return; const it=ITEMS[itid]; if(!it.slot)return;
    if(!meetsReqs(h,it))return;
    const cur=h.equipped[it.slot]; const gain=itemPower(it,0)-(cur?itemPower(ITEMS[cur.id],cur.tier):0);
    if(gain<=2)return; const price=shopBuyPrice(sh,itid);
    if(price>h.gold*0.7)return;
    if(!best||gain/Math.max(1,price)>best.ratio)best={shopKey:sh.key,itemId:itid,gain,ratio:gain/Math.max(1,price)};
  });});
  return best; }
function bestRecipe(h){ // pick highest-level recipe with inputs available (inv+bank) the hero can do
  let best=null;
  for(const r of RECIPES){ if(lvl(h,r.skill)<r.lvl)continue;
    const ok=Object.keys(r.inputs).every(id=>invQty(h,id)+bankQty(h,id)>=r.inputs[id]);
    if(!ok)continue;
    const useful=ITEMS[r.out].slot?isUpgradeFor(h,r.out)||ITEMS[r.out].value>200:true;
    if(!useful&&!chance(0.2))continue;
    if(!best||r.lvl>best.lvl)best=r; }
  return best; }
function bestEnhanceTarget(h){ for(const slot of ['weapon','body','legs','helm']){
    const e=h.equipped[slot]; if(!e)continue; if(e.tier>=3)continue;
    const matId=['mat_common','mat_uncommon','mat_rare'][e.tier];
    const cost=Math.round(CONFIG.enhBaseGold*Math.pow(CONFIG.enhTierMult,e.tier));
    if(h.gold>=cost*1.5&&invQty(h,matId)+bankQty(h,matId)>=2)return {slot}; }
  return null; }

/* =====================================================================
   ACTIVITY FSM — Layer 3 trips (§18.1) — phases prep→travel→work→return
   ===================================================================== */
function setMove(h,x,y){h.mt={x,y};}
function atTarget(h){return !h.mt||Math.hypot(h.x-h.mt.x,h.y-h.mt.y)<0.22;}
function moveStep(h){ if(!h.mt)return;
  const dx=h.mt.x-h.x,dy=h.mt.y-h.y,d=Math.hypot(dx,dy);
  if(d<0.05){h.mt=null;return;}
  const step=CONFIG.moveSpeed*CONFIG.tickSec*(h.hasty>0?1.25:1);
  const k=Math.min(1,step/d); h.x+=dx*k; h.y+=dy*k; }
function startAct(h,c){
  if(h.act&&h.act.type!==c.type)h.switches.push(S.simSec);
  h.act={type:c.type,loc:c.loc,data:c.data||{},phase:'prep',t:0,label:c.label};
  h.lastActType=c.type;
  narrate(h);
}
function gotoLoc(h,key){ const L=LOC[key]; if(L)setMove(h,L.x+(rng()-0.5)*0.8,L.y+(rng()-0.5)*0.8); }
function nearestBankKey(h){ return Math.hypot(h.x-LOC.westBank.x,h.y-LOC.westBank.y)<Math.hypot(h.x-LOC.eastBank.x,h.y-LOC.eastBank.y)?'westBank':'eastBank'; }

function stepHero(h){
  if(h.dead){ h.respawnT--; if(h.respawnT<=0)respawnHero(h); return; }
  if(h.hasty>0)h.hasty--;
  if(S.tick%10===0&&(!h.act||h.act.type!=='fight'||h.act.phase==='travel')){
    h.hp=Math.min(maxHp(h),h.hp+0.5); h.prayerPts=Math.min(lvl(h,'prayer'),h.prayerPts+0.15); }
  // reactive interrupts (§18.1) — highest priority
  if(h.hp<maxHp(h)*CONFIG.eatThresholdBase&&h.eatCd<=0){ if(tryEat(h))h.eatCd=2; }
  h.eatCd--;
  if(h.act&&h.act.type==='fight'&&!fightSafe(h)){ fleeFight(h); return; }
  // grave pull (perception-gated vulture, §14)
  if(!h.act||h.act.type!=='lootGrave'){ const g=perceivedGrave(h);
    if(g){ startAct(h,{type:'lootGrave',loc:null,data:{gid:g.id},label:'loot a gravestone'}); } }
  // decision cadence
  h.decideT--;
  const tripDone=!h.act;
  if(tripDone||(h.decideT<=0&&(!h.act||h.act.phase==='prep'||h.act.type==='rest'))){
    h.decideT=CONFIG.decisionTicks;
    if(!h.seized){ const c=chooseActivity(h);
      if(!h.act||c.s>scoreOfCurrent(h)+CONFIG.stickyBonus*0.5||tripDone)startAct(h,c); }
  }
  if(!h.act)return;
  const a=h.act; a.t++;
  switch(a.type){
    case 'gather': stepGather(h,a); break;
    case 'craft': stepCraft(h,a); break;
    case 'pray': stepPray(h,a); break;
    case 'fight': stepFight(h,a); break;
    case 'bank': stepBank(h,a); break;
    case 'shopBuy': stepShopBuy(h,a); break;
    case 'sellLoot': stepSellLoot(h,a); break;
    case 'geTrade': stepGeTrade(h,a); break;
    case 'slayerGet': stepSlayerGet(h,a); break;
    case 'enhance': stepEnhance(h,a); break;
    case 'rest': stepRest(h,a); break;
    case 'reincarnate': stepReincarnate(h,a); break;
    case 'lootGrave': stepLootGrave(h,a); break;
    default: h.act=null;
  }
  moveStep(h);
}
function scoreOfCurrent(h){ return 18; } // implicit commitment value
function fightSafe(h){ const a=h.act; if(!a||a.type!=='fight')return true;
  if(a.phase!=='work'&&a.phase!=='zonework')return true;
  const mi=a.phase==='zonework'?(h.away&&h.away.mon):a.data.mi;
  if(!mi||mi.hpCur<=0)return true;
  const mon=MONSTERS[mi.id];
  if(h.hp<mon.maxHit*2.3&&foodCount(h)<=0)return false; // burst range + no food: run NOW
  if(h.hp>maxHp(h)*0.55)return true;
  if(h.hp<maxHp(h)*0.4&&foodCount(h)<=0)return false; // last-ditch bail
  return winCheck(h,Object.assign({},mon,{hpCur:mi.hpCur}))||foodCount(h)>2; }
function fleeFight(h){
  const a=h.act;
  chron(1,`${h.name} flees from ${a.data.mi?MONSTERS[a.data.mi.id].name:'a fight'} — losing badly.`,h.id,'die');
  h.thought='This fight is going badly — running!';
  if(h.away)exitZone(h);
  h.act=null; gotoLoc(h,nearestBankKey(h));
}

/* ---- gather trip ---- */
function stepGather(h,a){
  if(a.phase==='prep'){ a.phase='travel'; gotoLoc(h,a.loc); narrate(h); return; }
  if(a.phase==='travel'){ if(atTarget(h)){a.phase='work';narrate(h);} return; }
  if(a.phase==='work'){
    a.prog=(a.prog||0)+actionRate(h,a.data.skill)*CONFIG.tickSec;
    if(a.prog>=1){ a.prog-=1;
      if(giveItem(h,a.data.res,1,0)){
        const it=ITEMS[a.data.res];
        a.got=(a.got||0)+1;
        gainXP(h,a.data.skill,(it.value*0.35+8));
        narrate(h);
      }
    }
    if(invCount(h)>=26||(a.got||0)>=24){ a.phase='return'; gotoLoc(h,nearestBankKey(h)); narrate(h); }
    return; }
  if(a.phase==='return'){ if(atTarget(h)){ depositAll(h,true); h.act=null; } return; }
}
/* ---- craft trip: withdraw inputs at bank → station → work ---- */
function stepCraft(h,a){
  const r=a.data.rec;
  if(a.phase==='prep'){ // need inputs in inventory
    const haveAll=Object.keys(r.inputs).every(id=>invQty(h,id)>=r.inputs[id]);
    if(haveAll){ a.phase='travel'; gotoLoc(h,a.loc); }
    else { a.phase='withdraw'; gotoLoc(h,nearestBankKey(h)); }
    narrate(h); return; }
  if(a.phase==='withdraw'){ if(atTarget(h)){
      depositAll(h,true);
      const stacky=Object.keys(r.inputs).every(id=>ITEMS[id].stack);
      let batches=stacky?16:4;
      Object.keys(r.inputs).forEach(id=>{ const want=r.inputs[id]*batches; const have=invQty(h,id);
        if(have<want)withdraw(h,id,want-have,0); });
      const can=Object.keys(r.inputs).every(id=>invQty(h,id)>=r.inputs[id]);
      if(!can){h.act=null;return;}
      a.phase='travel'; gotoLoc(h,a.loc); narrate(h);} return; }
  if(a.phase==='travel'){ if(atTarget(h)){a.phase='work';narrate(h);} return; }
  if(a.phase==='work'){
    a.prog=(a.prog||0)+actionRate(h,r.skill)*CONFIG.tickSec*0.8;
    if(a.prog>=1){ a.prog-=1;
      const can=Object.keys(r.inputs).every(id=>invQty(h,id)>=r.inputs[id]);
      if(!can){ a.phase='return'; gotoLoc(h,nearestBankKey(h)); return; }
      Object.keys(r.inputs).forEach(id=>takeItem(h,id,r.inputs[id]));
      giveItem(h,r.out,r.qty,0);
      gainXP(h,r.skill,r.xp);
      narrate(h);
    }
    if(invCount(h)>=27){ a.phase='return'; gotoLoc(h,nearestBankKey(h)); }
    return; }
  if(a.phase==='return'){ if(atTarget(h)){ depositAll(h,true); autoEquip(h); h.act=null; } return; }
}
/* ---- prayer at altar ---- */
function stepPray(h,a){
  if(a.phase==='prep'){
    if(invQty(h,'bones')+invQty(h,'big_bones')<8&&bankQty(h,'bones')+bankQty(h,'big_bones')>0){
      a.phase='withdraw'; gotoLoc(h,nearestBankKey(h)); narrate(h); return; }
    a.phase='travel'; gotoLoc(h,'church'); narrate(h); return; }
  if(a.phase==='withdraw'){ if(!atTarget(h))return;
    depositAll(h,true); withdraw(h,'big_bones',24,0); withdraw(h,'bones',24,0);
    a.phase='travel'; gotoLoc(h,'church'); narrate(h); return; }
  if(a.phase==='travel'){ if(atTarget(h)){a.phase='work';narrate(h);} return; }
  if(a.phase==='work'){
    const bone=invQty(h,'big_bones')>0?'big_bones':invQty(h,'bones')>0?'bones':null;
    if(!bone){ h.prayerPts=lvl(h,'prayer'); h.act=null; return; }
    a.prog=(a.prog||0)+0.5*CONFIG.tickSec*2;
    if(a.prog>=1){ a.prog-=1; takeItem(h,bone,1);
      const mult=S.town.buildings.altarGild?2.5:1;
      gainXP(h,'prayer',ITEMS[bone].prayXP*mult); narrate(h); }
    return; }
}
/* ---- bank ---- */
function stepBank(h,a){
  if(a.phase==='prep'){ a.phase='travel'; gotoLoc(h,nearestBankKey(h)); narrate(h); return; }
  if(a.phase==='travel'){ if(atTarget(h)){ depositAll(h,true);
    if(a.data&&a.data.food){ ['shark','swordfish','lobster','trout','shrimp'].forEach(f=>{ if(foodCount(h)<8)withdraw(h,f,8-foodCount(h),0); }); }
    autoEquip(h); h.act=null; } return; }
}
/* ---- shop buy ---- */
function stepShopBuy(h,a){
  if(a.phase==='prep'){ a.phase='travel'; gotoLoc(h,a.loc); narrate(h); return; }
  if(a.phase==='travel'){ if(!atTarget(h))return;
    const sh=S.shops[a.loc]; if(!sh){h.act=null;return;}
    const buys=[[a.data.itemId,a.data.qty]].concat(a.data.also||[]);
    let spent=0,boughtAny=false;
    buys.forEach(([itid,qty])=>{
      let n=0;
      while(n<qty&&(sh.stock[itid]||0)>0){
        const p=shopBuyPrice(sh,itid);
        if(h.gold<p)break;
        h.gold-=p; spent+=p; sh.stock[itid]--; n++;
        if(!giveItem(h,itid,1,0)){sh.stock[itid]++;h.gold+=p;spent-=p;break;}
      }
      if(n>0)boughtAny=true;
    });
    if(spent>0){ S.town.gold+=Math.round(spent*0.5); /* 50% circulates to treasury, 50% burned (§6.5) */ }
    if(a.data.equip&&boughtAny)autoEquip(h);
    h.act=null; return; }
}
/* ---- sell loot to shop ---- */
function stepSellLoot(h,a){
  if(a.phase==='prep'){ a.phase='travel'; gotoLoc(h,a.loc); narrate(h); return; }
  if(a.phase==='travel'){ if(!atTarget(h))return;
    const sh=S.shops[a.loc]; let earned=0;
    for(let i=h.inv.length-1;i>=0;i--){ const e=h.inv[i]; const it=ITEMS[e.id];
      if(it.heal>0&&invQty(h,e.id)<=6)continue;
      if(it.tags.includes('untradeable'))continue;
      if(it.slot&&isUpgradeFor(h,e.id))continue;
      if(S.town.geUnlocked&&it.value>=300&&!it.tags.includes('untradeable')&&!it.heal&&!e.id.startsWith('raw_')){ // route valuables to GE
        const price=Math.round(it.value*tmult(e.tier)*(0.9+rng()*0.25));
        S.ge.offers.push({kind:'sell',id:e.id,tier:e.tier,qty:e.qty,price,heroId:h.id,t:S.simSec});
        h.inv.splice(i,1); continue; }
      if(it.tags.includes('rare')&&it.value>20000)continue; // save big-ticket for GE
      sh.maxs[e.id]=sh.maxs[e.id]||20;
      const room=Math.max(0,(sh.maxs[e.id]+6)-(sh.stock[e.id]||0));
      if(room<=0)continue; // shop saturated — won't buy (forces labor redistribution, §6.5)
      const take=Math.min(room,e.qty);
      const p=shopSellPrice(sh,e.id);
      earned+=p*take; sh.stock[e.id]=(sh.stock[e.id]||0)+take;
      e.qty-=take; if(e.qty<=0)h.inv.splice(i,1);
    }
    if(earned>0){ h.gold+=earned; /* shop sell = minted gold (faucet, §6.2) */
      h.satisfaction=Math.min(100,h.satisfaction+1); }
    if(invCount(h)>14){ a.phase='dump'; gotoLoc(h,nearestBankKey(h)); h.thought='Market\u2019s flooded — storing the surplus.'; return; }
    h.act=null; return; }
  if(a.phase==='dump'){ if(atTarget(h)){ depositAll(h,true); h.act=null; } return; }
}
/* ---- GE offer matching (§6.4) ---- */
function stepGeTrade(h,a){
  if(a.phase==='prep'){ a.phase='travel'; gotoLoc(h,'geSite'); narrate(h); return; }
  if(a.phase==='travel'){ if(!atTarget(h))return;
    // post sell offers for valuables; match against standing buy offers
    for(let i=h.inv.length-1;i>=0;i--){ const e=h.inv[i]; const it=ITEMS[e.id];
      if(it.tags.includes('untradeable'))continue;
      if(it.value<300)continue;
      if(it.slot&&isUpgradeFor(h,e.id))continue;
      const price=Math.round(it.value*tmult(e.tier)*(0.9+rng()*0.25));
      S.ge.offers.push({kind:'sell',id:e.id,tier:e.tier,qty:e.qty,price,heroId:h.id,t:S.simSec});
      h.inv.splice(i,1);
    }
    // browse buy: post buy offer for the next big upgrade hero can't craft
    const want=geWishlist(h);
    if(want&&h.gold>ITEMS[want].value*0.8&&!S.ge.offers.some(o=>o.kind==='buy'&&o.heroId===h.id&&o.id===want))
      S.ge.offers.push({kind:'buy',id:want,tier:0,qty:1,price:Math.round(ITEMS[want].value*1.05),heroId:h.id,t:S.simSec});
    matchGE();
    h.act=null; return; }
}
function geWishlist(h){
  if(h._wishT!==undefined&&S.tick-h._wishT<80)return h._wish;
  h._wishT=S.tick; h._wish=geWishlistRaw(h); return h._wish; }
function geWishlistRaw(h){
  const wants=['abyssal_whip','occult_necklace','anguish_necklace','fury_amulet','salve_amulet','dragon_scimitar','black_dhide','god_cape','bandos_chestplate','armadyl_chest',
    'rune_scimitar','rune_platebody','mystic_staff','mystic_robe','magic_shortbow','green_dhide','glory_amulet','adamant_scimitar','adamant_platebody','mithril_platebody'];
  for(const id of wants){ const it=ITEMS[id];
    if(!hasItem(h,id)&&(meetsReqs(h,it)||closeToReqs(h,it))&&isUpgradeFor(h,id)&&h.gold>=it.value*0.9)return id; }
  return null; }
function matchGE(){
  const sells=S.ge.offers.filter(o=>o.kind==='sell');
  const buys=S.ge.offers.filter(o=>o.kind==='buy');
  buys.forEach(b=>{
    const match=sells.find(s=>s.qty>0&&s.id===b.id&&s.price<=b.price&&s.heroId!==b.heroId);
    if(!match)return;
    const buyer=heroById(b.heroId), seller=heroById(match.heroId);
    if(!buyer||!seller)return;
    const px=match.price, tax=Math.round(px*CONFIG.geTax);
    if(buyer.gold<px)return;
    buyer.gold-=px; seller.gold+=px-tax; /* GE tax = sink (§6.3) */
    if(!giveItem(buyer,b.id,1,match.tier)){ const k=bankKey(b.id,match.tier); buyer.bank[k]=(buyer.bank[k]||0)+1; }
    match.qty--; b.qty--;
    S.ge.lastPrices[b.id]=px;
    relDelta(buyer.id,seller.id,3); relDelta(seller.id,buyer.id,3);
    chron(1,`GE: ${seller.name} sold ${ITEMS[b.id].name} to ${buyer.name} for ${px}g.`,null,'gold');
    autoEquip(buyer);
  });
  // browse: any hero may buy a standing sell offer that upgrades them (abstract market access)
  sells.forEach(o2=>{ if(o2.qty<=0)return; const it=ITEMS[o2.id]; if(!it.slot&&!it.heal)return;
    const buyer=S.heroes.find(b2=>b2.id!==o2.heroId&&!b2.dead&&b2.gold>=o2.price
      &&it.slot&&isUpgradeFor(b2,o2.id)&&chance(0.4));
    if(!buyer)return;
    const seller=heroById(o2.heroId); if(!seller)return;
    const tax=Math.round(o2.price*CONFIG.geTax);
    buyer.gold-=o2.price; seller.gold+=o2.price-tax;
    if(!giveItem(buyer,o2.id,1,o2.tier)){const k=bankKey(o2.id,o2.tier);buyer.bank[k]=(buyer.bank[k]||0)+1;}
    o2.qty--; S.ge.lastPrices[o2.id]=o2.price;
    relDelta(buyer.id,o2.heroId,3); relDelta(o2.heroId,buyer.id,3);
    chron(1,`GE: ${seller.name} sold ${it.name} to ${buyer.name} for ${o2.price}g.`,null,'gold');
    autoEquip(buyer);
  });
  // expire: return unsold goods to seller banks
  S.ge.offers=S.ge.offers.filter(o2=>{
    if(o2.qty>0&&S.simSec-o2.t>=3600*4&&o2.kind==='sell'){ const sl2=heroById(o2.heroId);
      if(sl2){const k=bankKey(o2.id,o2.tier);sl2.bank[k]=(sl2.bank[k]||0)+o2.qty;} return false; }
    return o2.qty>0&&S.simSec-o2.t<3600*4; });
}
/* ---- Vannaka / slayer ---- */
function stepSlayerGet(h,a){
  if(a.phase==='prep'){ a.phase='travel'; gotoLoc(h,'gateW'); narrate(h); return; }
  if(a.phase==='travel'){ if(!atTarget(h))return;
    const pool=S.town.slayerPool.filter(mid=>MONSTERS[mid].slayerReq<=lvl(h,'slayer')&&canTakeProvisioned(h,mid));
    if(!pool.length){h.thought='Vannaka has nothing suitable for me yet.';h.act=null;return;}
    const mid=pick(pool); const mon=MONSTERS[mid];
    const n=mon.boss?ri(3,8):mon.hp>=80?ri(8,20):mon.hp>=40?ri(14,35):ri(20,60);
    h.slayerTask={monId:mid,left:n,total:n,partners:[]};
    chron(1,`Vannaka assigned ${h.name}: slay ${n} ${mon.name}${n>1?'s':''}.`,h.id,'lv');
    h.thought=`Vannaka wants ${n} ${mon.name}s dead. On it.`;
    // partnering (§15.4): up to 2 friends may join
    S.heroes.forEach(o=>{ if(o===h||o.dead||o.slayerTask)return;
      if(h.slayerTask.partners.length>=2)return;
      if(relTier(o.id,h.id)<1)return;
      if(combatLevel(o)<40)return;
      if(!canTakeProvisioned(o,mid))return;
      if(chance(0.4+o.traits.sociability*0.5)){
        o.slayerTask={monId:mid,left:n,total:n,partners:[h.id],shared:true};
        h.slayerTask.partners.push(o.id);
        chron(1,`${o.name} partnered with ${h.name} for the Slayer task.`,o.id,'soc');
        relDelta(o.id,h.id,5); relDelta(h.id,o.id,5);
      }});
    h.act=null; return; }
}
/* ---- enhancement forge (§5.6) ---- */
function stepEnhance(h,a){
  if(a.phase==='prep'){ a.phase='travel'; gotoLoc(h,'anvil'); narrate(h); return; }
  if(a.phase==='travel'){ if(!atTarget(h))return;
    const slot=a.data.slot; const e=h.equipped[slot];
    if(!e||e.tier>=3){h.act=null;return;}
    const matId=['mat_common','mat_uncommon','mat_rare'][e.tier];
    const cost=Math.round(CONFIG.enhBaseGold*Math.pow(CONFIG.enhTierMult,e.tier));
    if(invQty(h,matId)<2)withdraw(h,matId,2,0);
    if(h.gold<cost||invQty(h,matId)<2){h.act=null;return;}
    h.gold-=cost; takeItem(h,matId,2); /* gold+mats destroyed = sink */
    if(chance(CONFIG.enhSuccess[e.tier])){
      e.tier++;
      chron(e.tier>=3?3:1,`${h.name} enhanced their ${ITEMS[e.id].name} to ${TIERS[e.tier]}!`,h.id,e.tier>=3?'leg':'gold');
      if(e.tier>=3)h.saga.push(`Forged a Masterwork ${ITEMS[e.id].name}.`);
      h.satisfaction=Math.min(100,h.satisfaction+4);
    } else {
      if(e.tier===2&&chance(CONFIG.enhDowngradeChance)){ e.tier=1;
        chron(1,`${h.name}\u2019s Masterwork attempt backfired — ${ITEMS[e.id].name} dropped to Fine.`,h.id,'die'); }
      h.thought='The forge spat the materials back. Costly.';
      h.satisfaction=Math.max(0,h.satisfaction-2);
    }
    h.act=null; return; }
}
/* ---- rest / tavern social ---- */
function stepRest(h,a){
  if(a.phase==='prep'){ a.phase='travel'; gotoLoc(h,'tavern'); narrate(h); return; }
  if(a.phase==='travel'){ if(atTarget(h)){a.phase='work';a.restT=ri(8,20);narrate(h);} return; }
  if(a.phase==='work'){
    h.hp=Math.min(maxHp(h),h.hp+0.4); h.prayerPts=Math.min(lvl(h,'prayer'),h.prayerPts+0.3);
    h.satisfaction=Math.min(100,h.satisfaction+0.15*(S.town.buildings.tavern?2:1));
    // proximity friendship (+0.1/min, §16.3)
    S.heroes.forEach(o=>{ if(o===h||o.dead||o.zone!=='home')return;
      if(Math.hypot(o.x-h.x,o.y-h.y)<2.6&&chance(0.15)){relDelta(h.id,o.id,0.6);relDelta(o.id,h.id,0.6);}});
    if(--a.restT<=0)h.act=null;
    return; }
}
/* ---- reincarnation (§5.7) ---- */
function stepReincarnate(h,a){
  if(a.phase==='prep'){ a.phase='travel'; gotoLoc(h,'church'); narrate(h); return; }
  if(a.phase==='travel'){ if(!atTarget(h))return;
    doReincarnate(h); h.act=null; return; }
}
function doReincarnate(h){
  h.reinc++;
  h.echoXP=1+CONFIG.echoXP*h.reinc; h.echoDmg=1+CONFIG.echoDmg*h.reinc;
  // unequip everything to bank; reset skills
  Object.keys(h.equipped).forEach(s=>{ const e=h.equipped[s]; if(!e)return;
    const k=bankKey(e.id,e.tier); h.bank[k]=(h.bank[k]||0)+1; delete h.equipped[s]; });
  SKILLS.forEach(s=>h.skills[s].xp=0); h.skills.hitpoints.xp=LVLXP[10];
  h.hp=10; h.prayerPts=1;
  const rebate=200*h.reinc; h.gold+=rebate; giveItem(h,'mat_uncommon',h.reinc,0);
  autoEquip(h);
  chron(5,`✦ ${h.name} has REINCARNATED (life ${h.reinc+1}) — echoes grant +${Math.round(CONFIG.echoXP*h.reinc*100)}% XP, +${Math.round(CONFIG.echoDmg*h.reinc*100)}% damage. The Chronicle remembers.`,h.id,'leg');
  h.saga.push(`Reincarnated — began life ${h.reinc+1}.`);
  S.town.rep+=CONFIG.repPerClear;
}

/* =====================================================================
   FIGHT TRIPS — home camps + away zones + waves + GWD + Zezima
   ===================================================================== */
function spawnHomeMonsters(){
  S.monsters=[];
  [['farmS','chicken',4],['cowField','cow',4],['roadE','goblin',4],['sqStreets','man',3],
   ['palaceYard','guard',3],['stoneCircle','darkwiz7',3],['stoneCircle','darkwiz20',2]].forEach(([k,mid,n])=>{
    for(let i=0;i<n;i++)S.monsters.push(mkMonInst(mid,k));
  });
}
function mkMonInst(mid,campKey){ const L=LOC[campKey];
  return {id:mid,camp:campKey,hpCur:MONSTERS[mid].hp,
    x:L.x+(rng()-0.5)*2.4,y:L.y+(rng()-0.5)*2.4,respawnT:0,atkCd:0,engagedBy:null}; }
function mkZoneMon(mid){ return {id:mid,hpCur:MONSTERS[mid].hp,atkCd:0,zoneInst:true}; }

function enterZone(h,zoneId){
  h.zone=zoneId; h.away={zone:zoneId,mon:null,kc:0,wave:0,t:0};
  if(zoneId==='gwd')h.away.kc=0;
}
function exitZone(h){
  h.zone='home'; h.away=null;
  const back=ZONES[h.act&&h.act.data.zone?h.act.data.zone:'sewers'];
  const via=back&&back.via&&LOC[back.via]?back.via:'obelisk';
  h.x=LOC[via].x; h.y=LOC[via].y; h.px=h.x; h.py=h.y; h.mt=null;
}
function stepFight(h,a){
  const d=a.data;
  /* -------- prep: gear up, food, supplies -------- */
  if(a.phase==='prep'){
    const mon=MONSTERS[d.monId];
    // pick best style for target (triangle, immunities)
    let style=heroStyle(h);
    if(mon.meleeImmune)style=lvl(h,'ranged')>=lvl(h,'magic')?'ranged':'magic';
    else if(mon.weak)style=mon.weak;
    else if(h.fav==='magic'||h.directives.focus==='magic')style='magic';
    else if(h.fav==='ranged'||h.directives.focus==='ranged')style='ranged';
    else if(lvl(h,'attack')>=99&&lvl(h,'strength')>=99&&lvl(h,'defence')>=99
      &&(lvl(h,'magic')<99||lvl(h,'ranged')<99))style=lvl(h,'magic')<=lvl(h,'ranged')?'magic':'ranged';
    else { const best=['melee','ranged','magic'].map(st=>[st,st==='melee'?(lvl(h,'attack')+lvl(h,'strength'))/2:lvl(h,st)]).sort((x,y)=>y[1]-x[1])[0][0];
      style=best; }
    if(style==='ranged'&&invQty(h,arrowFor(h))<20&&bankQty(h,arrowFor(h))<20)style='melee';
    if(style==='magic'&&!bestSpell(h)&&bankQty(h,'mind_rune')<10)style='melee';
    a.style=style;
    const needAmmo=(style==='ranged'&&invQty(h,arrowFor(h))<60&&bankQty(h,arrowFor(h))>0)
      ||(style==='magic'&&!bestSpell(h)&&(bankQty(h,'mind_rune')+bankQty(h,'chaos_rune')+bankQty(h,'air_rune'))>0);
    const needBank=foodCount(h)<(mon.boss?8:3)||d.zone;
    if(needAmmo||(needBank&&(bankQty(h,'shark')+bankQty(h,'swordfish')+bankQty(h,'lobster')+bankQty(h,'trout')+bankQty(h,'shrimp'))>0)){
      a.phase='withdraw'; gotoLoc(h,nearestBankKey(h)); narrate(h); return; }
    autoEquip(h,style);
    a.phase='travel'; gotoLoc(h, d.zone?(ZONES[d.zone].via||'obelisk'):a.loc); narrate(h); return;
  }
  if(a.phase==='withdraw'){ if(!atTarget(h))return;
    depositAll(h,true); autoEquip(h,a.style);
    const want=MONSTERS[d.monId].boss?14:8;
    ['shark','swordfish','lobster','trout','shrimp'].forEach(f=>{ if(foodCount(h)<want)withdraw(h,f,want-foodCount(h),0); });
    if(a.style==='ranged')withdraw(h,arrowFor(h),150,0);
    if(a.style==='magic'){['air_rune','mind_rune','chaos_rune','death_rune','fire_rune','blood_rune'].forEach(r2=>withdraw(h,r2,60,0));}
    a.phase='travel'; gotoLoc(h, d.zone?(ZONES[d.zone].via||'obelisk'):a.loc); narrate(h); return; }
  /* -------- travel & zone entry -------- */
  if(a.phase==='travel'){ if(!atTarget(h))return;
    if(d.zone){ enterZone(h,d.zone); a.phase='zonework'; narrate(h); }
    else { a.phase='work'; narrate(h); }
    return; }
  /* -------- home camp combat (spatial, shared spawns) -------- */
  if(a.phase==='work'){
    let mi=d.mi;
    if(!mi||mi.hpCur<=0||mi.respawnT>0){
      mi=nearestCampMon(h,a.loc,d.monId); d.mi=mi;
      if(!mi){h.thought='Waiting for a respawn\u2026'; a.waitT=(a.waitT||0)+1;
        if(a.waitT>20||(a.t%30===0&&!anyCampMonSoon(a.loc,d.monId))){h.act=null;h.decideT=0;} return;}
      a.waitT=0; }
    if(Math.hypot(h.x-mi.x,h.y-mi.y)>0.9){setMove(h,mi.x,mi.y);return;}
    if(chance(0.02)){ const buddy=S.heroes.find(o=>o!==h&&!o.dead&&o.act&&o.act.type==='fight'&&o.act.loc===a.loc&&Math.hypot(o.x-h.x,o.y-h.y)<3);
      if(buddy){relDelta(h.id,buddy.id,0.5);relDelta(buddy.id,h.id,0.5);} }
    combatExchange(h,mi,false);
    if(mi.hpCur<=0){ onKill(h,mi); mi.respawnT=Math.round(8/CONFIG.tickSec); mi.engagedBy=null; d.mi=null;
      if(invCount(h)>=26){a.phase='return';gotoLoc(h,nearestBankKey(h));narrate(h);} }
    return; }
  /* -------- away-zone combat (per-hero encounters) -------- */
  if(a.phase==='zonework'){
    const z=ZONES[d.zone]; const aw=h.away;
    if(!aw){h.act=null;return;}
    aw.t++;
    if(d.zone==='zezima'){ stepZezimaFight(h,a); return; }
    if(z.waves){ stepWaves(h,a,z); return; }
    if(z.pvp&&maybePK(h))return;
    if(!aw.mon||aw.mon.hpCur<=0){
      // pick encounter: task target > chosen target > roster
      let mid=d.monId;
      if(z.generals&&aw.kc>=z.killcount){ mid=pickGeneral(h,z); aw.general=mid; }
      aw.mon=mkZoneMon(mid);
      if(MONSTERS[mid].boss)narrate(h);
    }
    combatExchange(h,aw.mon,S.lod&&!h.trackStar);
    if(aw.mon.hpCur<=0){
      onKill(h,aw.mon);
      if(z.generals){ if(!MONSTERS[aw.mon.id].boss)aw.kc++;
        else { chron(3,`${h.name} felled ${MONSTERS[aw.mon.id].name} in the God Wars Dungeon!`,h.id,'boss'); aw.kc=0; } }
      aw.mon=null;
      // trip end conditions
      if(invCount(h)>=26||foodCount(h)<=0){ exitZone(h); a.phase='return'; gotoLoc(h,nearestBankKey(h)); narrate(h); }
      else if(h.slayerTask===null&&d.fromTask){ exitZone(h); h.act=null; }
    }
    if(foodCount(h)<=0&&h.hp<maxHp(h)*0.5){ exitZone(h); a.phase='return'; gotoLoc(h,nearestBankKey(h)); narrate(h); }
    return; }
  if(a.phase==='return'){ if(atTarget(h)){ depositAll(h,true); autoEquip(h); h.act=null; } return; }
}
function nearestCampMon(h,campKey,mid){ let best=null,bd=99;
  S.monsters.forEach(m=>{ if(m.camp!==campKey||m.id!==mid||m.hpCur<=0||m.respawnT>0)return;
    if(m.engagedBy&&m.engagedBy!==h.id)return;
    const dd=Math.hypot(h.x-m.x,h.y-m.y); if(dd<bd){bd=dd;best=m;} });
  if(best)best.engagedBy=h.id;
  return best; }
function anyCampMonSoon(campKey,mid){ return S.monsters.some(m=>m.camp===campKey&&m.id===mid); }
function combatExchange(h,mi,statMode){
  const mon=MONSTERS[mi.id];
  h.atkCd-=1; mi.atkCd-=1;
  if(h.atkCd<=0){ const res=heroStrike(h,mi,statMode);
    h.atkCd=weaponSpd(h);
    if(res==='noammo'){ // fall back to melee
      autoEquip(h,'melee'); } }
  if(mi.atkCd<=0&&mi.hpCur>0){ monStrike(mi,h,statMode); mi.atkCd=mon.spd; }
  if(h.hp<=0)heroDie(h,null,mi);
}
function pickGeneral(h,z){
  const opts=z.generals.filter(g=>{
    if(MONSTERS[g].meleeImmune&&heroStyle(h)==='melee'&&lvl(h,'ranged')<60&&lvl(h,'magic')<60)return false;
    return canTake(h,g); });
  return opts.length?pick(opts):'gwd_follower';
}
/* -------- Fight Caves / Inferno waves -------- */
function stepWaves(h,a,z){
  const aw=h.away;
  if(!aw.mon||aw.mon.hpCur<=0){
    if(aw.mon&&aw.mon.hpCur<=0){
      if(MONSTERS[aw.mon.id].boss){ // victory!
        const cape=z.reward;
        giveItem(h,cape,1,0)||(h.bank[bankKey(cape,0)]=(h.bank[bankKey(cape,0)]||0)+1);
        if(cape==='infernal_cape')takeCape(h,'fire_cape'); // Inferno sacrifices the fire cape (canon)
        chron(4,`🔥 ${h.name} survived ${z.name} and earned the ${ITEMS[cape].name}!`,h.id,'leg');
        h.saga.push(`Conquered ${z.name} — ${ITEMS[cape].name}.`);
        onKill(h,aw.mon);
        autoEquip(h);
        exitZone(h); a.phase='return'; gotoLoc(h,nearestBankKey(h)); return;
      }
      aw.wave++;
    }
    const ladder=z.id==='inferno'?['tzkih','tzxil','tzxil','ketzek','ketzek','ketzek','ketzek']:['tzkih','tzkih','tzxil','tzxil','tzxil','ketzek','ketzek'];
    if(aw.wave>=ladder.length){ aw.mon=mkZoneMon(z.boss); narrate(h); chron(2,`${h.name} faces ${MONSTERS[z.boss].name}!`,h.id,'boss'); }
    else aw.mon=mkZoneMon(ladder[aw.wave]);
  }
  combatExchange(h,aw.mon,false); // waves always live (risk is LIVE-ONLY §8)
  if(foodCount(h)<=0&&h.hp<maxHp(h)*0.35){ // bail — run ends, no item loss
    chron(1,`${h.name} bailed from ${z.name} at wave ${aw.wave+1}.`,h.id,'die');
    exitZone(h); h.act=null; }
}
function takeCape(h,id){ if(takeItem(h,id,1))return;
  const k=Object.keys(h.bank).find(kk=>kk.split('|')[0]===id); if(k){h.bank[k]--;if(h.bank[k]<=0)delete h.bank[k];return;}
  Object.keys(h.equipped).forEach(s=>{if(h.equipped[s]&&h.equipped[s].id===id)delete h.equipped[s];}); }
/* -------- Wilderness PKing -------- */
function maybePK(h){
  if(h.traits.risk<0.6)return false;
  const targets=S.heroes.filter(o=>o!==h&&!o.dead&&o.zone==='wilderness'
    &&relTier(h.id,o.id)<1 // won't initiate on Friend+
    &&(relTier(h.id,o.id)<=-2?true:chance(0.003*h.traits.risk*h.traits.greed*10)));
  if(!targets.length)return false;
  const v=targets.sort((x,y)=>relTier(h.id,x.id)-relTier(h.id,y.id))[0];
  if(powerScore(h)<powerScore(v)*1.05&&relTier(h.id,v.id)>-2)return false;
  // PvP exchange — attacker skulls
  h.skulled=true;
  const dmgOut=Math.max(1,Math.round(heroDPS(h,{hp:maxHp(v),defLvl:lvl(v,'defence'),dBon:{melee:gearBonus(v,'dfc','melee'),ranged:gearBonus(v,'dfc','ranged'),magic:gearBonus(v,'dfc','magic')},hpCur:v.hp})*CONFIG.tickSec*1.4));
  v.hp-=dmgOut;
  v.thought=`${h.name} is attacking me!`;
  if(v.traits.risk>0.5&&powerScore(v)>powerScore(h)*0.9){ const back=Math.max(1,Math.round(heroDPS(v,{hp:maxHp(h),defLvl:lvl(h,'defence'),dBon:{melee:0,ranged:0,magic:0},hpCur:h.hp})*CONFIG.tickSec));
    h.hp-=back; if(h.hp<=0){heroDie(h,v,null);return true;} }
  else if(!tryEat(v)&&v.hp<maxHp(v)*0.3){ // victim flees
    chron(1,`${v.name} escaped ${h.name}\u2019s ambush in the Wilderness!`,v.id,'soc');
    exitZone(v); v.act=null; }
  if(v.hp<=0){ heroDie(v,h,null); return true; }
  return false;
}

/* =====================================================================
   ZEZIMA — the escalating rival (§5.8)
   ===================================================================== */
function ensureZezima(){
  if(!S.zezimaFight){ const c=S.town.zezimaCount;
    S.zezimaFight={hpCur:700+150*c,max:700+150*c,style:'melee',zPray:'ranged',
      switchT:0,delayT:0,count:c,atkCd:0,id:'zezima'};
  }
  return S.zezimaFight;
}
const Z_COUNTER={melee:'ranged',ranged:'magic',magic:'melee'}; // style that beats X (triangle: Melee>Ranged>Magic>Melee)
function stepZezimaFight(h,a){
  const z=ensureZezima(); const c=S.town.zezimaCount;
  z.engaged=S.simSec;
  // style cycling + prayer counter (prays vs the style that beats his current offence)
  z.switchT-=1;
  if(z.switchT<=0){ z.style=pick(['melee','ranged','magic']); z.switchT=Math.round(12/CONFIG.tickSec);
