    if(c<2){ z.delayT=Math.round(3/CONFIG.tickSec); } else { z.zPray=Z_COUNTER[z.style]; } }
  if(z.delayT>0){ z.delayT--; if(z.delayT===0)z.zPray=Z_COUNTER[z.style]; }
  // hero strikes (zPray wall applied in heroStrike via mi.zPray)
  h.atkCd--;
  if(h.atkCd<=0){
    const mi={id:'zezima',hpCur:z.hpCur,zPray:z.zPray,runtime:null};
    const res=heroStrike(h,mi,false);
    z.hpCur=mi.hpCur; h.atkCd=weaponSpd(h);
  }
  // Zezima strikes a random present challenger
  z.atkCd--;
  if(z.atkCd<=0){
    const present=S.heroes.filter(o=>!o.dead&&o.zone==='zezima');
    if(present.length){ const t=pick(present);
      const mi={id:'zezima',hpCur:z.hpCur,curStyle:z.style};
      const echo=1+CONFIG.echoDmg*c;
      const before=t.hp; monStrike(mi,t,false);
      const extra=Math.round((before-t.hp)*(echo-1)); t.hp-=extra;
      if(t.hp<=0)heroDie(t,null,{id:'zezima'});
    }
    z.atkCd=MONSTERS.zezima.spd;
  }
  if(z.hpCur<=0){ zezimaDefeated(h); return; }
  if(foodCount(h)<=0&&h.hp<maxHp(h)*0.4){
    chron(2,`${h.name} retreats from Zezima\u2019s arena, supplies spent.`,h.id,'die');
    exitZone(h); h.act=null; }
}
function zezimaDefeated(lastHitter){
  const c=++S.town.zezimaCount;
  S.zezimaFight=null;
  S.town.rep+=CONFIG.repPerZezima;
  const party=S.heroes.filter(o=>!o.dead&&o.zone==='zezima');
  chron(6,`⚔️ ZEZIMA HAS FALLEN (#${c})! ${party.map(p=>p.name).join(', ')||lastHitter.name} stand triumphant. He will return stronger\u2026`,lastHitter.id,'leg');
  party.forEach(p=>{ p.saga.push(`Defeated Zezima #${c}.`); p.gold+=5000*c; p.satisfaction=100;
    exitZone(p); p.act=null; });
  // he reincarnates like a hero — stays maxed, compounds echo (§5.8)
  MONSTERS.zezima.maxHit=30+4*c;
}

/* =====================================================================
   DEATH, GRAVESTONES & LOOTING (§14)
   ===================================================================== */
let nextGraveId=1;
function heroDie(h,killer,mi){
  h.deaths++; S.town.deaths++;
  const where=h.zone;
  // kept items: 3 / +1 protect item (Prayer 25) / skulled 0(+1)
  let keep=h.skulled?0:3;
  if(lvl(h,'prayer')>=25)keep+=1;
  const all=[];
  h.inv.forEach(e=>all.push({id:e.id,qty:e.qty,tier:e.tier,v:ITEMS[e.id].value*tmult(e.tier)}));
  Object.keys(h.equipped).forEach(s=>{ const e=h.equipped[s]; if(e)all.push({id:e.id,qty:1,tier:e.tier,v:ITEMS[e.id].value*tmult(e.tier)}); });
  all.sort((x,y)=>y.v-x.v);
  const kept=[],dropped=[];
  all.forEach(it=>{ if(ITEMS[it.id].tags.includes('untradeable')){kept.push(it);return;}
    if(kept.length<keep)kept.push(it); else dropped.push(it); });
  h.inv=[]; h.equipped={};
  kept.forEach(it=>giveItem(h,it.id,it.qty,it.tier));
  // waves zones: death ends run with NO item loss (canon)
  const noLoss=where==='fightcaves'||where==='inferno';
  if(!noLoss&&dropped.length){
    const g={id:nextGraveId++,zone:where,x:h.x,y:h.y,items:dropped,owner:h.id,t:S.simSec,
      killerId:killer?killer.id:null,
      publicAt:killer?S.simSec+60:S.simSec, // PvP: killer-only 60s; PvE: instantly public
      value:dropped.reduce((a2,it)=>a2+it.v*it.qty,0), grabT:0};
    S.graves.push(g);
    h.grave=g.id;
  } else if(noLoss){ dropped.forEach(it=>giveItem(h,it.id,it.qty,it.tier)); }
  if(mi&&MONSTERS[mi.id]){ h.fear=h.fear||{}; h.fear[mi.id]=S.simSec+900; }
  const cause=killer?`${killer.name} (PvP)`:mi?MONSTERS[mi.id]?MONSTERS[mi.id].name:'Zezima':'misadventure';
  chron(killer?3:2,`☠ ${h.name} was slain by ${cause}${where!=='home'?' in '+ZONES[where].name:''}.`,h.id,'die');
  h.saga.push(`Died to ${cause}.`);
  if(killer){ relDelta(h.id,killer.id,-25);
    // friendly give-back (§16.3)
    const tier=relTier(killer.id,h.id);
    if(tier>=1&&S.graves.find(g2=>g2.owner===h.id)){
      const p=tier>=2?0.8:0.4;
      if(chance(p)){ const g2=S.graves.find(g3=>g3.owner===h.id);
        g2.items.forEach(it=>{const k=bankKey(it.id,it.tier);h.bank[k]=(h.bank[k]||0)+it.qty;});
        S.graves=S.graves.filter(g3=>g3!==g2); h.grave=null;
        relDelta(h.id,killer.id,30);
        chron(2,`${killer.name} returned ${h.name}\u2019s belongings after the kill — honor among rivals.`,killer.id,'soc'); } }
  }
  h.satisfaction=Math.max(0,h.satisfaction-8);
  h.dead=true; h.respawnT=Math.round(30/CONFIG.tickSec);
  h.act=null; h.away=null; h.skulled=false; h.praying=null; h.mt=null;
  if(killer&&killer.zone==='wilderness')killer.kills++;
}
function respawnHero(h){
  h.dead=false; h.zone='home';
  h.x=LOC.westBank.x+1; h.y=LOC.westBank.y+1; h.px=h.x;h.py=h.y;
  h.hp=Math.max(10,Math.round(maxHp(h)*0.5)); h.prayerPts=Math.round(lvl(h,'prayer')*0.5);
  // reclaim: 10% instant buy-back if affordable (§14)
  const g=S.graves.find(g2=>g2.id===h.grave);
  if(g){ const fee=Math.ceil(g.value*CONFIG.reclaimFee);
    if(h.gold>=fee&&(h.traits.greed<0.85||g.value>2000)){
      h.gold-=fee; /* fee = sink */
      g.items.forEach(it=>{const k=bankKey(it.id,it.tier);h.bank[k]=(h.bank[k]||0)+it.qty;});
      S.graves=S.graves.filter(g2=>g2!==g); h.grave=null;
      h.thought=`Paid ${fee}g to reclaim my things. Worth it.`;
      autoEquip(h);
    } else if(g.zone==='home'||ZONES[g.zone].gate(h)){
      h.hasty=Math.round(90/CONFIG.tickSec);
      h.nudge={type:'lootGrave',loc:null,data:{gid:g.id,runback:true},label:'race back to my gravestone'};
    } }
  autoEquip(h);
}
function perceivedGrave(h){ // local perception only (§14)
  return S.graves.find(g=>{
    if(g.owner===h.id)return false;
    if(S.simSec<g.publicAt&&g.killerId!==h.id)return false;
    if(g.zone!==h.zone)return false;
    if(g.zone==='home'&&Math.hypot(h.x-g.x,h.y-g.y)>6)return false;
    const pull=h.traits.greed*g.value/Math.max(1,g.zone==='home'?Math.hypot(h.x-g.x,h.y-g.y)*40:80);
    return pull>1.2&&chance(0.25);
  });
}
function stepLootGrave(h,a){
  const g=S.graves.find(g2=>g2.id===a.data.gid);
  if(!g||!g.items.length){h.act=null;return;}
  if(a.data.runback&&g.zone!=='home'&&h.zone==='home'){ // travel into the zone via its gate
    if(a.phase==='prep'){a.phase='travel';gotoLoc(h,ZONES[g.zone].via||'obelisk');narrate(h);return;}
    if(a.phase==='travel'){ if(!atTarget(h))return; enterZone(h,g.zone); a.phase='grab'; return; } }
  if(g.zone==='home'){ if(Math.hypot(h.x-g.x,h.y-g.y)>0.7){setMove(h,g.x,g.y);return;} }
  else if(h.zone!==g.zone){h.act=null;return;}
  // 1 item per grab; interval 1.2–2.1s; hasty −0.3–0.7 (§14)
  g.grabT-=CONFIG.tickSec;
  if(g.grabT>0)return;
  let interval=CONFIG.grabMin+rng()*(CONFIG.grabMax-CONFIG.grabMin);
  if(g.owner===h.id||h.hasty>0)interval-=CONFIG.hastyMin+rng()*(CONFIG.hastyMax-CONFIG.hastyMin);
  g.grabT=interval;
  const it=g.items.shift();
  giveItem(h,it.id,it.qty,it.tier);
  if(g.owner!==h.id){ relDelta(g.owner,h.id,-Math.min(5,5)); // −5/item, cap handled by decay
    if(chance(0.3))chron(1,`${h.name} looted ${ITEMS[it.id].name} from ${heroById(g.owner)?heroById(g.owner).name:'a fallen hero'}\u2019s grave.`,h.id,'soc'); }
  if(!g.items.length){ S.graves=S.graves.filter(g2=>g2!==g);
    if(heroById(g.owner)&&heroById(g.owner).grave===g.id)heroById(g.owner).grave=null;
    if(g.zone!=='home'&&h.zone!=='home')exitZone(h);
    h.act=null; autoEquip(h); }
}

/* =====================================================================
   SOCIAL GRAPH, VOTES, POPULATION (§16) + CHRONICLE (§17)
   ===================================================================== */
function relKey(a,b){return a+'>'+b;}
function relGet(a,b){ const e=S.rel[relKey(a,b)]; if(!e)return 0;
  const days=(S.simSec-e.t)/(24*60*60/CONFIG.simMinPerRealSec/60); // sim days elapsed
  return e.r*Math.pow(CONFIG.relDecay,Math.max(0,days)); }
function relDelta(a,b,d){ if(a===b)return; const k=relKey(a,b);
  const cur=relGet(a,b); S.rel[k]={r:Math.max(-100,Math.min(100,cur+d)),t:S.simSec}; }
function relTier(a,b){ const r=relGet(a,b);
  return r<=-60?-2:r<=-20?-1:r<20?0:r<60?1:2; } // Nemesis/Rival/Neutral/Friend/Ally
const TIER_NAMES={'-2':'Nemesis','-1':'Rival','0':'Neutral','1':'Friend','2':'Ally'};

function chron(notability,text,heroId,cls){
  if(notability<1)return;
  S.chronicle.unshift({n:notability,text,heroId,cls:cls||'',day:S.day,
    time:fmtClock(),t:S.simSec});
  if(S.chronicle.length>400){
    for(let i=S.chronicle.length-1;i>=0;i--){ if(S.chronicle[i].n<=1){S.chronicle.splice(i,1);break;}
      if(i===0)S.chronicle.pop(); } }
  dlog(`EVENT n=${notability} ${text}`);
}
function fmtClock(){ const m=Math.floor(S.clockMin)%1440;
  return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }

/* ---- kick votes (§16.2) ---- */
function startVote(targetId){
  if(S.vote)return false;
  const cd=S.town.voteCooldown[targetId]||0;
  if(S.simSec<cd)return false;
  S.vote={targetId,endsAt:S.simSec+CONFIG.voteSeconds,yes:[],no:[],eligible:[]};
  S.heroes.forEach(o=>{
    if(o.id===targetId||o.dead||o.zone!=='home')return;
    const busy=o.act&&['fight','craft','gather'].includes(o.act.type)&&o.act.phase==='work';
    if(busy&&chance(0.6))return;
    S.vote.eligible.push(o.id);
  });
  const t=heroById(targetId);
  chron(2,`A vote has been called to EXILE ${t.name}! 30 seconds to decide.`,targetId,'soc');
  // ballots cast over the window
  S.vote.eligible.forEach(vid=>{
    const v=heroById(vid);
    const r=relGet(vid,targetId);
    const value=totalLevel(t)/200+(t.satisfaction>60?0.2:0);
    let pYes=0.45-r/150-value*0.3+(1-v.traits.loyalty)*0.2;
    pYes=Math.max(0.05,Math.min(0.95,pYes));
    (chance(pYes)?S.vote.yes:S.vote.no).push(vid);
  });
  return true;
}
function tickVote(){
  if(!S.vote||S.simSec<S.vote.endsAt)return;
  const v=S.vote; S.vote=null;
  const t=heroById(v.targetId); if(!t)return;
  const cast=v.yes.length+v.no.length;
  const quorumOK=cast>=Math.ceil(S.heroes.length*CONFIG.voteQuorum);
  if(!quorumOK){ chron(1,`The vote on ${t.name} was VOID — too few citizens voted (${cast}).`,t.id,'soc'); return; }
  v.yes.forEach(id=>relDelta(t.id,id,-15));
  v.no.forEach(id=>relDelta(t.id,id,10));
  if(v.yes.length>v.no.length){
    exileHero(t,v.yes.length/Math.max(1,cast));
  } else {
    S.town.kickFails[t.id]=(S.town.kickFails[t.id]||0)+1;
    S.town.voteCooldown[t.id]=S.simSec+CONFIG.voteCooldown;
    chron(2,`The town voted to KEEP ${t.name} (${v.no.length}–${v.yes.length}). ${S.town.kickFails[t.id]>=CONFIG.forceKickAfter?'The god may now force-exile.':''}`,t.id,'soc');
  }
}
function exileHero(t,resentment){
  chron(3,`⚖ ${t.name} has been EXILED from Varrock (${Math.round(resentment*100)}% voted against them).`,t.id,'die');
  S.town.exiles.push({name:t.name,resentment,t:S.simSec,appearance:t.appearance});
  S.town.rep=Math.max(0,S.town.rep-CONFIG.repPerKick*0.4);
  S.heroes=S.heroes.filter(o=>o!==t);
  if(resentment>0.6&&chance(0.7)){
    setTimeoutSim(60*ri(2,8),()=>{
      MONSTERS.vengeful.name=`Vengeful ${t.name}`;
      chron(3,`👁 A Vengeful Exile stalks the Wilderness — ${t.name} has returned, twisted by resentment.`,null,'die');
    });
  } else {
    setTimeoutSim(60*ri(5,15),()=>{ if(S.heroes.length<popCap()&&chance(0.5)){
      chron(1,`${t.name} reapplied for citizenship, humbled.`,null,'soc');
      const h=genHero(0); h.name=t.name; h.appearance=t.appearance; addHero(h); }});
  }
}
const simTimeouts=[];
function setTimeoutSim(sec,fn){simTimeouts.push({at:S.simSec+sec,fn});}
function tickSimTimeouts(){ for(let i=simTimeouts.length-1;i>=0;i--){
  if(S.simSec>=simTimeouts[i].at){ simTimeouts[i].fn(); simTimeouts.splice(i,1);} } }

/* ---- population & immigration (§16.1) ---- */
function popCap(){ return Math.min(CONFIG.popCapMax,CONFIG.popCapBase+4*(S.town.buildings.lodge||0)); }
function tickImmigration(){
  if(S.heroes.length>=popCap())return;
  const rate=CONFIG.baseImmig*(1+S.town.rep/CONFIG.repScale)*(1-S.heroes.length/popCap()*0.5);
  if(chance(rate*CONFIG.tickSec)){
    const h=genHero(); addHero(h);
    chron(2,`✚ A ${h.rarityName} adventurer, ${h.name}, has settled in Varrock. (${S.heroes.length}/${popCap()})`,h.id,'soc');
  }
}
function tickSatisfaction(h){
  let target=50;
  target+=(S.town.buildings.lodge?8:0)+(S.town.buildings.tavern?6:0)+(S.town.buildings.garden||0)*2+(S.town.buildings.statue||0)*1.5;
  const foodP=shopBuyPrice(S.shops.plaza,'shrimp')/ITEMS.shrimp.value;
  target-=Math.max(0,(foodP-1))*18; // overcharging hurts (§19.4)
  let friends=0; S.heroes.forEach(o=>{if(o!==h&&relTier(h.id,o.id)>=1)friends++;});
  target+=Math.min(10,friends*2.5);
  target-=h.deaths*0.5;
  h.satisfaction+=(target-h.satisfaction)*0.004;
  h.satisfaction=Math.max(0,Math.min(100,h.satisfaction));
  if(h.satisfaction<CONFIG.leaveThreshold)h.unhappyDays+=CONFIG.tickSec/(86400/ (CONFIG.simMinPerRealSec*60));
  else h.unhappyDays=0;
  if(h.unhappyDays>CONFIG.leaveDurationDays&&h.traits.loyalty<0.6){
    chron(2,`${h.name} packed up and left Varrock — unhappy with life here.`,h.id,'die');
    S.heroes=S.heroes.filter(o=>o!==h);
  }
}
function recomputeRep(){
  let rep=10;
  Object.keys(S.town.buildings).forEach(b=>rep+=(BUILDINGS[b].rep||0)*S.town.buildings[b]);
  Object.values(S.shops).forEach(sh=>rep+=Math.floor(sh.level/5));
  rep+=S.town.zezimaCount*CONFIG.repPerZezima;
  rep+=Object.keys(S.town.monsterKills).filter(m=>MONSTERS[m].boss&&S.town.monsterKills[m]>0).length*CONFIG.repPerClear;
  S.heroes.forEach(h=>{ rep+=SKILLS.filter(s=>lvl(h,s)>=99).length*1.5; rep+=h.reinc*4; rep+=totalLevel(h)/150; });
  rep-=Math.min(30,S.town.deaths*0.05);
  S.town.rep=Math.max(0,Math.round(rep));
}

/* =====================================================================
   ECONOMY TICKS — upkeep attractor (§6), restock, faucet/sink telemetry
   ===================================================================== */
function dailyRollover(){
  S.day++;
  // hero living costs: flat + wealth-proportional (the self-correcting attractor)
  S.heroes.forEach(h=>{
    const cost=Math.min(h.gold,Math.round(CONFIG.flatUpkeep+Math.max(0,h.gold-CONFIG.upkeepFloor)*CONFIG.wealthUpkeepRate));
    h.gold-=cost; /* destroyed (sink) */
  });
  // building upkeep from treasury
  let upkeep=0;
  Object.keys(S.town.buildings).forEach(b=>upkeep+=BUILDINGS[b].upkeep*S.town.buildings[b]);
  S.town.gold=Math.max(0,S.town.gold-upkeep);
  recomputeRep();
  // gate 1: GE road unlocks at any combat 40 (§5.2)
  if(!S.town.gate1&&S.heroes.some(h=>combatLevel(h)>=40)){
    S.town.gate1=true;
    chron(3,'⚑ Gate 1 reached — a hero hit Combat 40. The road north can be opened (GE Annex now buildable) and Vannaka takes students.',null,'leg');
  }
  // auto-curate slayer pool: player can edit; default = all unlocked
  Object.keys(S.town.monsterKills).forEach(mid=>{
    const mon=MONSTERS[mid]; const need=mon.boss?CONFIG.bossUnlockKills:CONFIG.slayerUnlockKills;
    if(S.town.monsterKills[mid]>=need&&!S.town.slayerPool.includes(mid))S.town.slayerPool.push(mid);
  });
  snapshot('daily');
  checkAnomalies();
}
function totalGold(){ let g=S.town.gold; S.heroes.forEach(h=>g+=h.gold); return g; }
function snapshot(why){
  const acts={}; S.heroes.forEach(h=>{const k=h.act?h.act.type:'idle';acts[k]=(acts[k]||0)+1;});
  const snap={day:S.day,t:S.simSec,why,pop:S.heroes.length,gold:totalGold(),treasury:S.town.gold,
    rep:S.town.rep,kills:S.town.kills,deaths:S.town.deaths,
    avgCmb:Math.round(S.heroes.reduce((a,h)=>a+combatLevel(h),0)/Math.max(1,S.heroes.length)),
    foodPrice:shopBuyPrice(S.shops.plaza,'shrimp'),acts,
    zez:S.town.zezimaCount,maxed:S.heroes.filter(isMaxed).length};
  S.snapshots.push(snap); if(S.snapshots.length>200)S.snapshots.shift();
  S.totalGoldHist.push({t:S.simSec,g:snap.gold}); if(S.totalGoldHist.length>400)S.totalGoldHist.shift();
  dlog(`SNAPSHOT day=${snap.day} pop=${snap.pop} totalGold=${snap.gold} treasury=${snap.treasury} rep=${snap.rep} kills=${snap.kills} deaths=${snap.deaths} avgCmb=${snap.avgCmb} acts=${JSON.stringify(acts)}`);
}
function checkAnomalies(){
  const hist=S.totalGoldHist;
  if(hist.length>=2){
    const a=hist[hist.length-2],b=hist[hist.length-1];
    const days=Math.max(0.2,(b.t-a.t)/(1440/CONFIG.simMinPerRealSec));
    const drift=(b.g-a.g)/Math.max(100,a.g)/days;
    if(Math.abs(drift)>CONFIG.goldDriftWarn)
      flagAnomaly(`gold drift ${(drift*100).toFixed(1)}%/day (faucet/sink imbalance, §6)`);
  }
  S.heroes.forEach(h=>{
    if(h.gold<5&&foodCount(h)===0&&invCount(h)<3&&!h.act)flagAnomaly(`${h.name} broke+foodless+idle`);
    h.switches=h.switches.filter(t=>S.simSec-t<120);
    if(h.switches.length>10)flagAnomaly(`${h.name} thrashing (${h.switches.length} switches/2min)`);
  });
}
function flagAnomaly(msg){ const line=`ANOMALY day=${S.day} ${msg}`;
  S.anomalies.push(line); if(S.anomalies.length>60)S.anomalies.shift(); dlog(line); }
function dlog(line){ S.dbg.push(`[d${S.day} ${fmtClock()}] ${line}`); if(S.dbg.length>3000)S.dbg.shift(); }

/* =====================================================================
   THOUGHTS — legibility (§20)
   ===================================================================== */
function narrate(h){
  const a=h.act;
  if(!a){h.thought='Deciding what to do next\u2026';return;}
  const at=k=>LOC[k]?LOC[k].label:k;
  if(a.type==='gather'){
    if(a.phase==='travel')h.thought=`Heading to ${at(a.loc)} to ${a.label}.`;
    else if(a.phase==='work')h.thought=`${cap(a.data.skill)} at ${at(a.loc)} — ${a.got||0} ${ITEMS[a.data.res].name.toLowerCase()} this trip.`;
    else if(a.phase==='return')h.thought='Inventory\u2019s full — heading to the bank.';
  } else if(a.type==='craft'){
    const r=a.data.rec;
    if(a.phase==='withdraw')h.thought=`Grabbing materials from the bank for ${ITEMS[r.out].name.toLowerCase()}s.`;
    else if(a.phase==='work')h.thought=`Making ${ITEMS[r.out].name.toLowerCase()}s (${cap(r.skill)} ${lvl(h,r.skill)}).`;
    else h.thought=`Off to craft ${ITEMS[r.out].name.toLowerCase()}s.`;
  } else if(a.type==='fight'){
    const mon=MONSTERS[a.data.monId];
    if(a.phase==='withdraw')h.thought=`Banking for supplies before facing ${mon.name}s.`;
    else if(a.phase==='travel')h.thought=a.data.zone?`Traveling to ${ZONES[a.data.zone].name}\u2026`:`Heading out to fight ${mon.name.toLowerCase()}s.`;
    else if(a.phase==='zonework'&&h.away&&h.away.wave!==undefined&&ZONES[a.data.zone]&&ZONES[a.data.zone].waves)h.thought=`${ZONES[a.data.zone].name} — wave ${h.away.wave+1}. ${foodCount(h)} food left.`;
    else if(a.phase==='zonework'&&a.data.zone==='gwd'&&h.away)h.thought=h.away.general?`Fighting ${MONSTERS[h.away.general].name}!`:`GWD killcount: ${h.away.kc}/40.`;
    else if(a.phase==='zonework'&&a.data.zone==='zezima')h.thought=`FIGHTING ZEZIMA — he\u2019s praying against ${S.zezimaFight?S.zezimaFight.zPray:'us'}!`;
    else if(a.phase==='zonework')h.thought=`Hunting ${mon.name.toLowerCase()}s in ${ZONES[a.data.zone].name} · ${foodCount(h)} food.`;
    else if(a.phase==='work')h.thought=`Fighting ${mon.name.toLowerCase()}s · ${foodCount(h)} food left.`;
    else if(a.phase==='return')h.thought='Loot\u2019s heavy — banking it.';
    if(h.slayerTask&&h.slayerTask.monId===a.data.monId)h.thought+=` (Slayer: ${h.slayerTask.left} left)`;
  } else if(a.type==='shopBuy')h.thought=`Buying ${ITEMS[a.data.itemId].name.toLowerCase()} at ${at(a.loc)}.`;
  else if(a.type==='sellLoot')h.thought='Selling spare loot at the General Store.';
  else if(a.type==='geTrade')h.thought='Posting offers at the Grand Exchange.';
  else if(a.type==='bank')h.thought='Making a bank run.';
  else if(a.type==='pray')h.thought=`Offering bones at the altar (Prayer ${lvl(h,'prayer')}).`;
  else if(a.type==='slayerGet')h.thought='Off to see Vannaka about work.';
  else if(a.type==='enhance')h.thought='Taking my gear to the Enhancement Forge\u2026';
  else if(a.type==='rest')h.thought=h.traits.sociability>0.5?'Relaxing at the Blue Moon with the others.':'Resting a while.';
  else if(a.type==='reincarnate')h.thought='My life is complete. Time to begin again\u2026';
  else if(a.type==='lootGrave')h.thought=a.data.runback?'Racing back to my gravestone!':'That looks like a fresh gravestone\u2026';
}

/* =====================================================================
   SIM ORCHESTRATION — fixed 0.6s tick (§4)
   ===================================================================== */
function simTick(){
  S.tick++; S.simSec+=CONFIG.tickSec;
  S.clockMin+=CONFIG.tickSec*CONFIG.simMinPerRealSec; // 1 real sec = 2 sim min → day = 12 real min at 1×
  if(S.clockMin>=1440){ S.clockMin-=1440; dailyRollover(); }
  S.lod=(SPEED>=8);
  // monster respawns + idle wander
  S.monsters.forEach(m=>{
    if(m.hpCur<=0){ if(--m.respawnT<=0){ m.hpCur=MONSTERS[m.id].hp; m.engagedBy=null;
      const L=LOC[m.camp]; m.x=L.x+(rng()-0.5)*2.4; m.y=L.y+(rng()-0.5)*2.4; } }
    else if(!m.engagedBy&&chance(0.02)){ const L=LOC[m.camp];
      m.x=Math.max(L.x-1.6,Math.min(L.x+1.6,m.x+(rng()-0.5)*0.6));
      m.y=Math.max(L.y-1.6,Math.min(L.y+1.6,m.y+(rng()-0.5)*0.6)); }
  });
  // heroes
  S.heroes.forEach(h=>{ h.px=h.x; h.py=h.y; stepHero(h); tickSatisfaction(h); });
  // periodic systems
  if(S.tick%8===0)shopRestockTick();
  if(S.tick%20===0)matchGE();
  tickVote(); tickImmigration(); tickSimTimeouts();
  if(S.tick%500===0)snapshot('periodic');
  if(S.tick%150===0)checkAnomalies();
  // zezima fight despawn if abandoned
  if(S.zezimaFight&&S.simSec-S.zezimaFight.engaged>30){
    S.zezimaFight=null; }
}
/* clock: make the constant honest — recompute clockMin increment */

/* =====================================================================
   OFFLINE CATCH-UP (§4 / §18.5) — statistical projection on load
   ===================================================================== */
function expectedYieldPerHour(h){
  const a=h.act; const out={xp:{},gold:0,items:{}};
  if(!a){ out.gold=10; return out; }
  if(a.type==='gather'){ const rate=actionRate(h,a.data.skill)*3600*0.6;
    out.xp[a.data.skill]=(ITEMS[a.data.res].value*0.35+8)*rate;
    out.items[a.data.res]=Math.round(rate); return out; }
  if(a.type==='craft'){ const r=a.data.rec; const rate=actionRate(h,r.skill)*3600*0.45;
    out.xp[r.skill]=r.xp*rate; out.items[r.out]=Math.round(rate*r.qty*0.5); return out; }
  if(a.type==='fight'){ const mon=MONSTERS[a.data.monId];
    const dps=heroDPS(h,Object.assign({hpCur:mon.hp},mon));
    const kph=3600/Math.max(5,mon.hp/Math.max(0.05,dps)+8);
    const dmgph=Math.min(dps*3600,mon.hp*kph);
    const xs=heroStyle(h)==='melee'?'strength':heroStyle(h);
    out.xp[xs]=dmgph*4; out.xp.hitpoints=dmgph*1.33;
    out.gold=kph*(mon.coins[0]+mon.coins[1])/2;
    out.kph=kph; out.monId=mon.id; return out; }
  if(a.type==='pray'){ out.xp.prayer=ITEMS.bones.prayXP*1200; return out; }
  return out;
}
function runOfflineCatchup(hours){
  hours=Math.min(CONFIG.offlineCapH,hours);
  if(hours<=0.02)return null;
  S.offlineMode=true;
  const eff=hours*CONFIG.offlineRate;
  const summary=[];
  S.heroes.forEach(h=>{
    if(h.dead){h.dead=false;respawnHero(h);}
    const y=expectedYieldPerHour(h);
    const lines=[];
    Object.keys(y.xp).forEach(s=>{ const amt=y.xp[s]*eff; if(amt<1)return;
      const b4=lvl(h,s); gainXP(h,s,amt/CONFIG.xpRate/h.echoXP); const af=lvl(h,s);
      if(af>b4)lines.push(`${cap(s)} ${b4}→${af}`); });
    if(y.gold){h.gold+=Math.round(y.gold*eff); lines.push(`+${Math.round(y.gold*eff)}g`);}
    Object.keys(y.items).forEach(id=>{ const q=Math.round(y.items[id]*eff); if(!q)return;
      const k=bankKey(id,0); h.bank[k]=(h.bank[k]||0)+q; lines.push(`+${q} ${ITEMS[id].name}`); });
    if(y.kph){ const kills=Math.round(y.kph*eff);
      S.town.monsterKills[y.monId]=(S.town.monsterKills[y.monId]||0)+kills;
      h.kills+=kills; S.town.kills+=kills;
      for(let i=0;i<Math.min(kills,400);i++)rollDrops(h,MONSTERS[y.monId],false);
      lines.push(`${kills} ${MONSTERS[y.monId].name} kills`); }
    if(lines.length)summary.push(`${h.name}: ${lines.join(', ')}`);
  });
  S.offlineMode=false;
  chron(3,`⌛ While you were away (${hours.toFixed(1)}h at ${Math.round(CONFIG.offlineRate*100)}% rate): the colony kept living.`,null,'leg');
  dlog(`OFFLINE catchup hours=${hours.toFixed(2)} eff=${eff.toFixed(2)}`);
  return summary;
}

/* =====================================================================
   SAVE / LOAD (§25) — JSON export/import (no browser storage)
   ===================================================================== */
function serializeSave(){
  S.savedAt=Date.now();
  return JSON.stringify({schema:1,config:CONFIG,state:S},null,0);
}
function loadSave(json){
  const data=JSON.parse(json);
  if(!data.state)throw new Error('Not a Gielinor Tycoon save.');
  Object.assign(CONFIG,data.config||{});
  S=data.state;
  setSeed((S.seed^S.tick)>>>0||1);
  const dt=(Date.now()-(S.savedAt||Date.now()))/3600000;
  const summary=runOfflineCatchup(dt);
  return summary;
}

};
/* ---- drag camera (EHT style) ---- */
let drag=null;
cv.style.cursor='grab';
cv.addEventListener('mousedown',e=>{ if(e.button!==0)return;
  const r=cv.getBoundingClientRect();
  drag={sx:e.clientX-r.left,sy:e.clientY-r.top,px:panX,py:panY,moved:false};
  cv.style.cursor='grabbing'; });
window.addEventListener('mouseup',e=>{
  if(drag&&!drag.moved){ const r=cv.getBoundingClientRect();
    handleClick(e.clientX-r.left,e.clientY-r.top); }
  drag=null; cv.style.cursor='grab'; });
cv.addEventListener('wheel',e=>{ e.preventDefault();
  const r=cv.getBoundingClientRect(); const mx=e.clientX-r.left,my=e.clientY-r.top;
  const w=toWorld(mx,my);
  zoom=Math.min(1.8,Math.max(0.45,zoom*(e.deltaY<0?1.12:0.89)));
  panX=mx-w.x*zoom; panY=my-w.y*zoom; clampPan(); },{passive:false});
/* touch: one-finger pan, two-finger pinch */
let touch=null;
cv.addEventListener('touchstart',e=>{ const r=cv.getBoundingClientRect();
  if(e.touches.length===1){ const t=e.touches[0];
    touch={sx:t.clientX-r.left,sy:t.clientY-r.top,px:panX,py:panY,moved:false,pinch:null}; }
  else if(e.touches.length===2){ const [a,b]=e.touches;
    touch={pinch:{d:Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY),z:zoom,
      cx:(a.clientX+b.clientX)/2-r.left,cy:(a.clientY+b.clientY)/2-r.top},moved:true}; } },{passive:true});
cv.addEventListener('touchmove',e=>{ if(!touch)return; e.preventDefault();
  const r=cv.getBoundingClientRect();
  if(touch.pinch&&e.touches.length===2){ const [a,b]=e.touches;
    const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    const w=toWorld(touch.pinch.cx,touch.pinch.cy);
    zoom=Math.min(1.8,Math.max(0.45,touch.pinch.z*d/touch.pinch.d));
    panX=touch.pinch.cx-w.x*zoom; panY=touch.pinch.cy-w.y*zoom; clampPan(); }
  else if(e.touches.length===1&&!touch.pinch){ const t=e.touches[0];
    const mx=t.clientX-r.left,my=t.clientY-r.top;
    if(Math.hypot(mx-touch.sx,my-touch.sy)>6)touch.moved=true;
    panX=touch.px+(mx-touch.sx); panY=touch.py+(my-touch.sy); clampPan(); } },{passive:false});
cv.addEventListener('touchend',e=>{ if(touch&&!touch.moved&&!touch.pinch&&e.changedTouches.length){
    const r=cv.getBoundingClientRect(); const t=e.changedTouches[0];
    handleClick(t.clientX-r.left,t.clientY-r.top); }
  if(!e.touches.length)touch=null; });
/* picking & tooltip */
cv.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect(); const mx=e.clientX-r.left,my=e.clientY-r.top;
  if(drag){ if(Math.hypot(mx-drag.sx,my-drag.sy)>5)drag.moved=true;
    if(drag.moved){ panX=drag.px+(mx-drag.sx); panY=drag.py+(my-drag.sy); clampPan();
      document.getElementById('tip').style.display='none'; return; } }
  const w=toWorld(mx,my); const wx=w.x, wy=w.y;
  const tip=document.getElementById('tip');
  let best=null,bd=18/zoom;
  S&&S.heroes.forEach(h=>{ if(h.dead||h.zone!=='home')return;
    const p=iso(h.x,h.y); const d=Math.hypot(p.x-wx,p.y+TH/2-10-wy);
    if(d<bd){bd=d;best={kind:'hero',h};} });
  if(!best){ Object.keys(LOC).forEach(k=>{ const p=iso(LOC[k].x,LOC[k].y);
    const d=Math.hypot(p.x-wx,p.y+TH/2-wy); if(d<bd+6/zoom){bd=d;best={kind:'loc',k};} }); }
  hoverInfo=best;
  if(best){
    tip.style.display='block'; tip.style.left=(mx+14)+'px'; tip.style.top=(my+8)+'px';
    if(best.kind==='hero'){ const h=best.h;
      tip.innerHTML=`<b style="color:var(--gold)">${h.name}</b> · Cmb ${combatLevel(h)} · ${h.rarityName}${h.reinc?' · Life '+(h.reinc+1):''}<br><i>${h.thought}</i>`; }
    else { const L=LOC[best.k];
      let extra='';
      if(L.enter)extra=ZONES[L.enter]?'→ '+ZONES[L.enter].name:'';
      if(L.portal)extra='Teleports: '+Object.values(ZONES).filter(z=>z.via==='obelisk').map(z=>z.name).join(', ');
      if(S.shops[best.k]){const sh=S.shops[best.k];extra='Lv'+sh.level+' · stock: '+Object.keys(sh.stock).filter(i2=>sh.stock[i2]>0).slice(0,4).map(i2=>ITEMS[i2].name+'×'+sh.stock[i2]).join(', ');}
      tip.innerHTML=`<b>${L.label}</b><br>${extra}`; }
  } else tip.style.display='none';
});
function handleClick(mx,my){
  const w=toWorld(mx,my);
  // re-pick at click point (touch has no hover)
  let best=null,bd=18/zoom;
  S&&S.heroes.forEach(h=>{ if(h.dead||h.zone!=='home')return;
    const p=iso(h.x,h.y); const d=Math.hypot(p.x-w.x,p.y+TH/2-10-w.y);
    if(d<bd){bd=d;best={kind:'hero',h};} });
  if(!best){ Object.keys(LOC).forEach(k=>{ const p=iso(LOC[k].x,LOC[k].y);
    const d=Math.hypot(p.x-w.x,p.y+TH/2-w.y); if(d<bd+6/zoom){bd=d;best={kind:'loc',k};} }); }
  if(best&&best.kind==='hero'){ Render.select(best.h.id); UI.markOnboard('click'); }
  else if(best&&best.kind==='loc'&&S.shops[best.k]){ UI.showShops(best.k); }
  else { // seize-move: directly order the selected, seized hero
    const h=selId&&heroById(selId);
    if(h&&h.seized&&!h.dead){ const g=unIso(w.x,w.y-TH/2);
      h.act={type:'rest',loc:'tavern',data:{},phase:'work',restT:9999,label:'following orders'};
      h.thought='Going where the god commands.';
      setMove(h,Math.max(0,Math.min(MAPW-1,g.x)),Math.max(0,Math.min(MAPH-1,g.y))); }
  }
}
})();}

    h2+='</div><div class="sec"><h3>Monster knowledge</h3><table class="t"><tr><th>Monster</th><th>Kills</th></tr>';
    Object.keys(S.town.monsterKills).sort((a,b)=>S.town.monsterKills[b]-S.town.monsterKills[a]).slice(0,14).forEach(m=>{
      h2+=`<tr><td>${MONSTERS[m].name}</td><td>${S.town.monsterKills[m]}</td></tr>`; });
    h2+='</table></div>';
    el.innerHTML=h2;
  }
}

function renderRight(){
  if(!['heroes','chron','tele'].includes(panelTab))return;
  const el=$('panelbody');
  if(panelTab==='heroes'){
    let h2='';
    [...S.heroes].sort((a,b)=>(b.trackStar?1:0)-(a.trackStar?1:0)||combatLevel(b)-combatLevel(a)).forEach(h=>{
      const sel=h.id===(Render.selId&&Render.selId());
      h2+=`<div class="hcard ${sel?'sel':''}" onclick="Render.select(${h.id})">
        <div class="dot" style="background:${h.appearance.shirt}"></div>
        <div style="flex:1;min-width:0">
          <div class="nm">${h.trackStar?'★ ':''}${h.name} ${h.reinc?'<span class="badge r">✦'+h.reinc+'</span>':''}
            ${h.dead?'<span class="badge dead">dead '+Math.ceil(h.respawnT*CONFIG.tickSec)+'s</span>':h.zone!=='home'?'<span class="badge away">'+ZONES[h.zone].name+'</span>':''}</div>
          <div class="meta">Cmb ${combatLevel(h)} · Tot ${totalLevel(h)} · ${cap(h.fav)} · ${h.gold}g</div>
          <div class="bar hpbar"><i style="width:${Math.max(0,h.hp)/maxHp(h)*100}%;background:${h.hp>maxHp(h)*0.4?'var(--moss)':'var(--blood)'}"></i></div>
        </div></div>`;
    });
    el.innerHTML=h2||'<div class="note">The town is empty.</div>';
  } else if(panelTab==='chron'){
    let h2='<div style="margin-bottom:6px"><select id="chrf" onchange="UI.rr()"><option value="0">All events</option><option value="2">Notable (2+)</option><option value="3">Major (3+)</option><option value="5">Legendary (5+)</option></select></div>';
    const f=+((document.getElementById('chrf')||{}).value||0);
    S.chronicle.filter(e=>e.n>=f).slice(0,80).forEach(e=>{
      h2+=`<div class="ev ${e.cls}"><span class="t">D${e.day} ${e.time}</span>${e.text}</div>`; });
    el.innerHTML=h2;
  } else { // telemetry
    const last=S.snapshots[S.snapshots.length-1];
    let h2=`<div class="sec"><h3>Telemetry</h3>
      <div class="kv"><span>Tick</span><span>${S.tick}</span></div>
      <div class="kv"><span>Sim speed</span><span>${SPEED}× ${S.lod?'(LOD statistical combat)':''}</span></div>
      <div class="kv"><span>Total gold</span><span>${totalGold()}g</span></div>
      <div class="kv"><span>Frame</span><span>${Render.fps||'—'} fps</span></div></div>`;
    h2+='<div class="sec"><h3>Gold history (drift watch ±15%/day)</h3><canvas id="spark" style="width:100%;height:40px"></canvas></div>';
    h2+='<div class="sec"><h3>Activity histogram</h3>';
    if(last)Object.keys(last.acts).forEach(k=>{ h2+=`<div class="kv"><span>${k}</span><span>${last.acts[k]}</span></div>`; });
    h2+='</div><div class="sec"><h3>Anomaly flags ('+S.anomalies.length+')</h3>'+
      (S.anomalies.slice(-8).map(a2=>`<div class="ev die">${a2}</div>`).join('')||'<div class="note">None — economy stable.</div>')+'</div>';
    el.innerHTML=h2;
    drawSpark();
  }
}
UI.rr=()=>renderPanel();
function drawSpark(){ const c=document.getElementById('spark'); if(!c)return;
  const g=c.getContext('2d'); const W2=c.width=c.clientWidth,H2=c.height=40;
  const hist=S.totalGoldHist; if(hist.length<2)return;
  const min=Math.min(...hist.map(p=>p.g)),max=Math.max(...hist.map(p=>p.g));
  g.strokeStyle='#c9a24b';g.beginPath();
  hist.forEach((p,i2)=>{ const x=i2/(hist.length-1)*W2, y=H2-4-(p.g-min)/Math.max(1,max-min)*(H2-8);
    i2?g.lineTo(x,y):g.moveTo(x,y); });
  g.stroke();
  g.fillStyle='#a89a80';g.font='9px Verdana';g.fillText(min+'–'+max+'g',3,9);
}

/* ---- DRAWER (hero panel §20) ---- */
UI.openDrawer=id=>{ drawerId=id; $('stage').classList.add('drawer-open'); renderDrawer(); };
UI.closeDrawer=()=>{ drawerId=null; $('stage').classList.remove('drawer-open'); };
$('d-close').onclick=()=>UI.closeDrawer();
document.querySelectorAll('[data-dt]').forEach(b=>b.onclick=()=>{ drawerTab=b.dataset.dt;
  document.querySelectorAll('[data-dt]').forEach(x=>x.classList.toggle('on',x===b)); renderDrawer(); });
function renderDrawer(){
  const h=drawerId&&heroById(drawerId);
  if(!h){UI.closeDrawer();return;}
  $('d-id').innerHTML=`<div style="display:flex;gap:8px;align-items:center">
    <div class="dot" style="width:34px;height:34px;border-radius:50%;background:${h.appearance.shirt};border:2px solid ${h.appearance.hair}"></div>
    <div><div class="nm serif" style="font-size:15px;color:var(--gold)">${h.name}</div>
    <div class="note">${h.rarityName}${h.reinc?' · Life '+(h.reinc+1)+' ✦':''}${h.skulled?' · 💀 skulled':''}</div></div></div>
    <div style="margin-top:6px" class="note">${h.backstory}</div>
    <div class="kv" style="margin-top:6px"><span>Combat</span><span>${combatLevel(h)}</span></div>
    <div class="kv"><span>Total level</span><span>${totalLevel(h)}</span></div>
    <div class="kv"><span>HP</span><span>${Math.max(0,Math.round(h.hp))}/${maxHp(h)}</span></div>
    <div class="kv"><span>Prayer pts</span><span>${Math.round(h.prayerPts)}</span></div>
    <div class="kv"><span>Gold</span><span>${h.gold}g</span></div>
    <div class="kv"><span>Wealth</span><span>${heroWealth(h)}g</span></div>
    <div class="kv"><span>Satisfaction</span><span>${Math.round(h.satisfaction)}</span></div>
    <div class="kv"><span>Where</span><span>${h.dead?'respawning':ZONES[h.zone].name}</span></div>
    <button class="tiny" style="margin-top:6px" onclick="UI.closeDrawer()">Close ▾</button>`;
  const B=$('d-body');
  if(drawerTab==='stats'){
    let h2='<div class="skgrid">';
    SKILLS.forEach(s=>{ const L=lvl(h,s);
      h2+=`<div class="skcell ${s===h.fav?'fav':''}" title="${Math.floor(h.skills[s].xp)} xp"><span>${cap(s).slice(0,9)}</span><b>${L}</b></div>`; });
    h2+='</div><div style="margin-top:8px" class="note">Favorite: <b style="color:var(--gold)">'+cap(h.fav)+'</b> · secondary '+cap(h.sec)+
      ' · Traits — risk '+pct(h.traits.risk)+', greed '+pct(h.traits.greed)+', ambition '+pct(h.traits.ambition)+', sociability '+pct(h.traits.sociability)+', patience '+pct(h.traits.patience)+', loyalty '+pct(h.traits.loyalty)+'</div>';
    h2+=`<div class="note">Style bonuses — Atk m/r/m: ${gearBonus(h,'atk','melee')}/${gearBonus(h,'atk','ranged')}/${gearBonus(h,'atk','magic')} · Str ${gearBonus(h,'strB')} · Def m/r/m: ${gearBonus(h,'dfc','melee')}/${gearBonus(h,'dfc','ranged')}/${gearBonus(h,'dfc','magic')}</div>`;
    if(h.slayerTask)h2+=`<div class="thought">Slayer task: ${h.slayerTask.left}/${h.slayerTask.total} ${MONSTERS[h.slayerTask.monId].name}s${h.slayerTask.partners&&h.slayerTask.partners.length?' (partnered)':''} · ${h.slayerPts} pts</div>`;
    B.innerHTML=h2;
  } else if(drawerTab==='thoughts'){
    const c=!h.seized?chooseActivity(h):null;
    let h2=`<div class="thought" style="font-size:13px">“${h.thought}”</div>`;
    h2+=`<div class="note">Current trip: <b>${h.act?h.act.label+' — '+h.act.phase:'(between trips)'}</b>${h.seized?' · SEIZED (brain suspended)':''}</div>`;
    const d=drive(h);
    h2+='<h3 style="margin:8px 0 4px;color:var(--gold-dim)">Drives</h3>';
    Object.keys(d).forEach(k=>{ h2+=`<div class="kv"><span>${k}</span><span><div class="bar" style="width:90px;display:inline-block"><i style="width:${Math.min(100,d[k])}%"></i></div></span></div>`; });
    if(c)h2+=`<div class="note" style="margin-top:6px">Top of mind next: ${c.label} (utility ${c.s.toFixed(1)})</div>`;
    B.innerHTML=h2;
  } else if(drawerTab==='gear'){
    let h2='<h3 style="color:var(--gold-dim);margin-bottom:4px">Equipped</h3>';
    ['weapon','helm','body','legs','shield','neck','cape','ring','ammo'].forEach(s=>{
      const e=h.equipped[s];
      h2+=`<span class="gslot"><b>${s}</b>${e?`<span class="${TIERCLS[e.tier]}">${ITEMS[e.id].name}${e.tier?' ['+TIERS[e.tier]+']':''}${e.qty>1?' ×'+e.qty:''}</span>`:'<span class="note">—</span>'}</span>`; });
    h2+='<h3 style="color:var(--gold-dim);margin:8px 0 4px">Inventory ('+invCount(h)+'/28)</h3>';
    h.inv.forEach(e=>{ h2+=`<span class="gslot"><span class="${TIERCLS[e.tier]}">${ITEMS[e.id].name}</span>${e.qty>1?' ×'+e.qty:''}</span>`; });
    h2+='<h3 style="color:var(--gold-dim);margin:8px 0 4px">Bank ('+bankSlots(h)+'/'+S.town.bankCap+' slots)</h3>';
    Object.keys(h.bank).slice(0,40).forEach(k=>{ const [id,t]=k.split('|');
      h2+=`<span class="gslot"><span class="${TIERCLS[+t]}">${ITEMS[id].name}</span> ×${h.bank[k]}</span>`; });
    B.innerHTML=h2;
  } else if(drawerTab==='rel'){
    let rows=[];
    S.heroes.forEach(o=>{ if(o===h)return; const r=relGet(h.id,o.id);
      if(Math.abs(r)<3)return; rows.push([o,r]); });
    rows.sort((a,b)=>b[1]-a[1]);
    let h2=rows.length?'':'<div class="note">No strong bonds or grudges yet — they build through trades, taverns, kills, and votes (§16).</div>';
    rows.forEach(([o,r])=>{ const t=TIER_NAMES[String(relTier(h.id,o.id))];
      h2+=`<div class="relrow"><span>${o.name}</span><span style="color:${r>20?'var(--moss)':r<-20?'var(--blood)':'var(--parch-dim)'}">${t} (${r.toFixed(0)})</span></div>`; });
    B.innerHTML=h2;
  } else { // saga
    let h2=`<div class="note" style="margin-bottom:6px">${h.kills} kills · ${h.deaths} deaths · ${h.slayerPts} slayer pts</div>`;
    h2+=h.saga.slice().reverse().map(s=>`<div class="ev">${s}</div>`).join('');
    B.innerHTML=h2;
  }
  renderCmds(h);
}
function pct(v){return Math.round(v*100)+'%';}
function renderCmds(h){
  const dis=(ok,why)=>ok?'':`disabled title="${why}"`;
  const fightable=['goblin','guard','darkwiz20','mossgiant','scurrius'].find(m=>canTake(h,m));
  $('d-cmds').innerHTML=`
  <h3 style="color:var(--gold-dim)">Nudge (one-off, §18.4)</h3>
  <button class="tiny" onclick="UI.nudgeTrain(${h.id})">Train favorite (${cap(h.fav)})</button>
  <button class="tiny" ${dis(!!fightable,'No safe target in range')} onclick="UI.nudgeFight(${h.id})">Fight ${fightable?MONSTERS[fightable].name:'—'}</button>
  <button class="tiny" ${dis(combatLevel(h)>=40&&S.town.slayerPool.length>0,'Needs Combat 40 + an enabled task pool')} onclick="UI.nudge(${h.id},'slayerGet','gateW',{})">Get Slayer task</button>
  <button class="tiny" onclick="UI.nudge(${h.id},'bank','westBank',{})">Go bank</button>
  <button class="tiny" onclick="UI.nudge(${h.id},'rest','tavern',{})">Rest at tavern</button>
  <button class="tiny" ${dis(ZONES.fightcaves.gate(h)&&!hasItem(h,'fire_cape'),'Gate: Combat 70 (or cape already earned)')} onclick="UI.nudge(${h.id},'fight','__zone_fightcaves',{monId:'jad',zone:'fightcaves'})">Attempt Fight Caves</button>
  <button class="tiny" ${dis(ZONES.gwd.gate(h),'Gate: 60 Str + 61 Magic')} onclick="UI.nudge(${h.id},'fight','__zone_gwd',{monId:'gwd_follower',zone:'gwd'})">Raid God Wars</button>
  <button class="tiny" ${dis(isMaxed(h),'Requires all 17 skills at 99')} onclick="UI.nudge(${h.id},'reincarnate','church',{})">✦ Reincarnate</button>
  <button class="tiny gold" ${dis(ZONES.zezima.gate(h),'Gate: maxed + Infernal cape')} onclick="UI.nudge(${h.id},'fight','__zone_zezima',{monId:'zezima',zone:'zezima'})">⚔ CHALLENGE ZEZIMA</button>
  <h3 style="color:var(--gold-dim);margin-top:8px">Standing directives</h3>
  <select onchange="UI.directive(${h.id},'focus',this.value)" style="width:100%;margin-bottom:4px">
    <option value="">Focus: (none)</option>${SKILLS.map(s=>`<option ${h.directives.focus===s?'selected':''} value="${s}">Focus: ${cap(s)}</option>`).join('')}
  </select>
  <button class="tiny ${h.directives.avoidWild?'gold':''}" onclick="UI.directive(${h.id},'avoidWild',${!h.directives.avoidWild})">${h.directives.avoidWild?'✓ ':''}Avoid the Wilderness</button>
  <h3 style="color:var(--gold-dim);margin-top:8px">Seize / civic</h3>
  <button class="tiny ${h.seized?'gold':''}" onclick="UI.seize(${h.id})">${h.seized?'Release control':'Seize control (click map to move)'}</button>
  <button class="tiny ${h.trackStar?'gold':''}" onclick="UI.track(${h.id})">${h.trackStar?'★ Tracked':'☆ Track this hero'}</button>
  <button class="tiny" ${S.vote?'disabled title="A vote is already running"':''} onclick="UI.vote(${h.id})">⚖ Call exile vote</button>
  ${(S.town.kickFails[h.id]||0)>=CONFIG.forceKickAfter?`<button class="tiny" style="border-color:var(--blood)" onclick="UI.forceKick(${h.id})">FORCE exile (failsafe)</button>`:''}`;
}
UI.nudge=(id,type,loc,data)=>{ const h=heroById(id); if(!h||h.dead)return;
  UI.markOnboard('nudge');
  h.nudge={type,loc,data,s:999,label:'a divine nudge'};
  h.act=null; h.decideT=0; h.thought='A voice from above\u2026 very well.'; };
UI.nudgeTrain=id=>{ const h=heroById(id); if(!h)return;
  const c=chooseActivity(h); // bias: directly pick best activity for fav skill
  const map={mining:['gather','mineSE',{skill:'mining',res:bestNodeRes(h,'mine'),node:'mine'}],
    woodcutting:['gather','yewsE',{skill:'woodcutting',res:bestNodeRes(h,'wc'),node:'wc'}],
    fishing:['gather','riverW',{skill:'fishing',res:bestNodeRes(h,'fish'),node:'fish'}],
    hunter:['gather','hunterE',{skill:'hunter',res:'kebbit_fur',node:'hunt'}],
    runecraft:['gather','essence',{skill:'runecraft',res:'rune_essence',node:'essence'}],
    prayer:['pray','church',{}]};
  const m=map[h.fav];
  if(m)UI.nudge(id,m[0],m[1],m[2]);
  else UI.nudgeFight(id); };
UI.nudgeFight=id=>{ const h=heroById(id); if(!h)return;
  const order=['scurrius','mossgiant','darkwiz20','guard','goblin'];
  const mid=order.find(m=>canTake(h,m))||'goblin';
  const camp={goblin:'roadE',guard:'palaceYard',darkwiz20:'stoneCircle'}[mid];
  if(camp)UI.nudge(id,'fight',camp,{monId:mid,camp:true});
  else UI.nudge(id,'fight','__zone_sewers',{monId:mid,zone:'sewers'}); };
UI.directive=(id,k,v)=>{ const h=heroById(id); if(!h)return;
  if(v===''||v===false)delete h.directives[k]; else h.directives[k]=v; renderDrawer(); };
UI.seize=id=>{ const h=heroById(id); if(!h)return; h.seized=!h.seized;
  if(h.seized){h.act=null;h.thought='I feel\u2026 a hand upon me.';}
  else h.thought='The presence lifts. Back to my own life.';
  renderDrawer(); };
UI.track=id=>{ const h=heroById(id); if(h){h.trackStar=!h.trackStar;renderDrawer();} };
UI.vote=id=>{ if(startVote(id))renderLeft(); };
UI.forceKick=id=>{ const h=heroById(id); if(!h)return;
  chron(3,`⚡ The god invoked the failsafe: ${h.name} is force-exiled after ${S.town.kickFails[h.id]} failed votes.`,h.id,'die');
  exileHero(h,0.9); UI.closeDrawer(); };

/* ---- master render loop ---- */
let uiT=0;
function renderAll(force){
  $('stage').classList.toggle('dock-left',CONFIG.uiDock==='left');
  renderPanel(); if(drawerId)renderDrawer();
  $('hud-gold').textContent=S.town.gold;
  $('hud-rep').textContent=S.town.rep;
  $('hud-pop').textContent=S.heroes.length+'/'+popCap();
  $('hud-zez').textContent=S.town.zezimaCount;
  $('clock').textContent=`Day ${S.day} · ${fmtClock()}`;
}
UI.renderAll=renderAll;
renderOnboard();

/* ---- boot ---- */
newState(((Math.random()*2**31)|0)||7777);
let last=performance.now(), acc=0, frames=0, fpsT=0;
function loop(now){
  const dt=Math.min(0.25,(now-last)/1000); last=now;
  frames++; fpsT+=dt; if(fpsT>=1){Render.fps=frames;frames=0;fpsT=0;}
  acc+=dt*SPEED;
  const tickDur=CONFIG.tickSec;
  let guard=0;
  while(acc>=tickDur&&guard<40){ simTick(); acc-=tickDur; guard++; }
  Render.frame(Math.min(1,acc/tickDur));
  uiT+=dt; if(uiT>0.5){uiT=0;renderAll();}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();}
